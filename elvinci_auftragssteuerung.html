<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>elvinci · Auftragssteuerung</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════════
   APPLE DESIGN TOKENS (D — Reskin) — Light + Dark Auto
   ═══════════════════════════════════════════════════════ */
:root {
    /* Apple Foundation */
    --bg-primary:    #f5f5f7;
    --bg-secondary:  #ffffff;
    --bg-tertiary:   #fbfbfd;
    --bg-glass:      rgba(255, 255, 255, 0.72);
    --separator:     rgba(60, 60, 67, 0.12);
    --separator-strong: rgba(60, 60, 67, 0.22);
    --label:         #1d1d1f;
    --label-2:       #6e6e73;
    --label-3:       #86868b;
    --label-disabled:#aeaeb2;
    --accent:        #0071e3;
    --accent-hover:  #0077ed;
    --success:       #00c896;
    --warning:       #ff9500;
    --error:         #ff3b30;
    --info:          #5856d6;
    --pink:          #ff2d55;

    /* Bucket-Farben (Planner-aligned) */
    --b-verkauf:     #5856d6;
    --b-rechnung:    #ff9500;
    --b-kommi:       #34c759;
    --b-versand:     #007aff;
    --b-abholung:    #ff3b30;
    --b-angemeldet:  #5ac8fa;
    --b-beendet:     #86868b;

    /* Schatten */
    --shadow-1: 0 1px 2px rgba(0,0,0,0.04), 0 1px 3px rgba(0,0,0,0.06);
    --shadow-2: 0 4px 6px rgba(0,0,0,0.05), 0 2px 4px rgba(0,0,0,0.04);
    --shadow-3: 0 10px 15px rgba(0,0,0,0.08), 0 4px 6px rgba(0,0,0,0.04);
    --shadow-pop: 0 12px 32px rgba(0,0,0,0.16);

    /* Radien */
    --r-card: 14px;
    --r-input: 10px;
    --r-pill: 999px;
    --r-button: 8px;

    /* Motion */
    --ease-out: cubic-bezier(0.32, 0.72, 0, 1);
    --ease-spring: cubic-bezier(0.5, 1.25, 0.75, 1.25);

    /* Backwards-Compat-Aliase — alle Inline-style="...var(--bg)..." References im JS bleiben gültig */
    --bg: var(--bg-primary);
    --sf: var(--bg-secondary);
    --sf2: var(--bg-tertiary);
    --bd: var(--separator);
    --bda: rgba(0, 113, 227, 0.45);
    --bdd: rgba(0, 200, 150, 0.45);
    --tx: var(--label);
    --txd: var(--label-2);
    --txb: var(--label);
    --blue: var(--accent);
    --grn: var(--success);
    --green: var(--success);
    --red: var(--error);
    --amb: var(--warning);
    --orange: var(--warning);
    --pur: var(--info);
    --pnk: var(--pink);
}
@media (prefers-color-scheme: dark) {
    :root {
        --bg-primary:    #1d1d1f;
        --bg-secondary:  #2c2c2e;
        --bg-tertiary:   #3a3a3c;
        --bg-glass:      rgba(28, 28, 30, 0.72);
        --separator:     rgba(255, 255, 255, 0.10);
        --separator-strong: rgba(255, 255, 255, 0.18);
        --label:         #f5f5f7;
        --label-2:       #a1a1a6;
        --label-3:       #8e8e93;
        --label-disabled:#5e5e63;
        --accent:        #0a84ff;
        --accent-hover:  #409cff;
        --success:       #30d158;
        --warning:       #ff9f0a;
        --error:         #ff453a;
        --info:          #bf5af2;
        --pink:          #ff375f;
        --shadow-1: 0 1px 2px rgba(0,0,0,0.20), 0 1px 3px rgba(0,0,0,0.30);
        --shadow-2: 0 4px 6px rgba(0,0,0,0.22), 0 2px 4px rgba(0,0,0,0.18);
        --shadow-3: 0 10px 15px rgba(0,0,0,0.32), 0 4px 6px rgba(0,0,0,0.22);
        --shadow-pop: 0 12px 32px rgba(0,0,0,0.5);
    }
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: -apple-system, "SF Pro Display", "SF Pro Text", "Inter", "Instrument Sans", system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    background: var(--bg-primary);
    color: var(--label);
    min-height: 100vh;
    font-size: 15px;
    line-height: 1.4;
}
.mono { font-family: "SF Mono", "JetBrains Mono", ui-monospace, monospace; font-size: 0.93em; }
.wrap { max-width: 760px; margin: 0 auto; padding: 32px 20px 96px; }

/* ─── TAGS — Apple-Soft-Pills ─── */
.tag {
    display: inline-flex;
    align-items: center;
    padding: 3px 10px;
    border-radius: var(--r-pill);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.02em;
    line-height: 1.4;
}
.t-zz          { background: rgba(255,59,48,0.10);  color: var(--error); }
.t-vk          { background: rgba(0,200,150,0.12);  color: var(--success); }
.t-bar         { background: rgba(255,149,0,0.12);  color: var(--warning); }
.t-zoll        { background: rgba(0,113,227,0.10);  color: var(--accent); }
.t-kombi       { background: rgba(88,86,214,0.12);  color: var(--info); }
.t-loose       { background: rgba(255,59,48,0.10);  color: var(--error); }
.t-klein       { background: rgba(0,113,227,0.10);  color: var(--accent); }
.t-sonder      { background: rgba(255,59,48,0.10);  color: var(--error); }
.t-p1          { background: rgba(255,59,48,0.10);  color: var(--error); }
.t-p2          { background: rgba(255,149,0,0.12);  color: var(--warning); }
.t-ok          { background: rgba(0,200,150,0.12);  color: var(--success); }
.t-privat      { background: rgba(88,86,214,0.12);  color: var(--info); }
.t-uit         { background: rgba(0,113,227,0.10);  color: var(--accent); }
.t-storno      { background: rgba(120,120,128,0.18); color: var(--label-2); text-decoration: line-through; }
.t-warte       { background: rgba(255,149,0,0.12);  color: var(--warning); }
.t-kontaktiert { background: rgba(0,200,150,0.12);  color: var(--success); }
.t-abholung    { background: rgba(120,80,50,0.12);  color: #8b5a2b; }
@media (prefers-color-scheme: dark) {
    .t-abholung { color: #c8a880; background: rgba(200,168,128,0.12); }
}

/* ─── BLOCK (Stage-Card) ─── */
.block {
    background: var(--bg-secondary);
    border: 1px solid var(--separator);
    border-radius: var(--r-card);
    margin-bottom: 16px;
    overflow: hidden;
    box-shadow: var(--shadow-1);
    transition: border-color 0.25s var(--ease-out), box-shadow 0.25s var(--ease-out), opacity 0.25s var(--ease-out);
}
.block.locked { opacity: 0.45; pointer-events: none; }
.block.active {
    border-color: var(--accent);
    box-shadow: var(--shadow-2), 0 0 0 4px rgba(0, 113, 227, 0.10);
}
.block.done { border-color: rgba(0, 200, 150, 0.30); }

.bh {
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    user-select: none;
}
.bh .n {
    width: 26px; height: 26px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700; flex-shrink: 0;
    margin-right: 14px;
    transition: background 0.2s var(--ease-out);
}
.np { background: var(--bg-tertiary); color: var(--label-3); }
.na { background: var(--accent); color: #fff; box-shadow: 0 0 0 4px rgba(0, 113, 227, 0.15); }
.nd { background: var(--success); color: #fff; }
.bh .t { font-size: 14px; font-weight: 600; color: var(--label-2); flex: 1; }
.block.active .bh .t { color: var(--label); }
.block.done .bh .t { color: var(--success); }
.bh .s {
    font-size: 12px; color: var(--label-3);
    max-width: 320px; text-align: right;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.bb { padding: 0 20px 22px; }

/* ─── FELDER ─── */
.f { margin-bottom: 16px; }
.f label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    color: var(--label-2);
    margin-bottom: 6px;
    letter-spacing: 0.01em;
    text-transform: none;
}
.f input, .f select, .f textarea {
    width: 100%;
    background: var(--bg-primary);
    border: 1px solid var(--separator);
    color: var(--label);
    border-radius: var(--r-input);
    padding: 10px 12px;
    font-size: 14px;
    font-family: inherit;
    transition: border-color 0.15s var(--ease-out), box-shadow 0.15s var(--ease-out), background 0.15s var(--ease-out);
}
.f input:focus, .f select:focus, .f textarea:focus {
    outline: none;
    border-color: var(--accent);
    background: var(--bg-secondary);
    box-shadow: 0 0 0 3px rgba(0, 113, 227, 0.15);
}
.f select option { background: var(--bg-secondary); color: var(--label); }
.f textarea { resize: vertical; min-height: 64px; line-height: 1.5; }
.f .h { font-size: 12px; color: var(--label-3); margin-top: 4px; }
.f.err input, .f.err select, .f.err textarea { border-color: var(--error); }
.f.err .h { color: var(--error); }

.rw { display: grid; gap: 14px; }
.r2 { grid-template-columns: 1fr 1fr; }
.r3 { grid-template-columns: 1fr 1fr 1fr; }
@media (max-width: 600px) { .r2, .r3 { grid-template-columns: 1fr; } }

/* ─── OPTIONEN (Card-Buttons) ─── */
.opt {
    border: 1.5px solid var(--separator);
    background: var(--bg-secondary);
    border-radius: var(--r-card);
    padding: 14px;
    cursor: pointer;
    transition: all 0.15s var(--ease-out);
    text-align: center;
    box-shadow: var(--shadow-1);
}
.opt:hover {
    border-color: var(--separator-strong);
    transform: translateY(-1px);
    box-shadow: var(--shadow-2);
}
.opt.sel {
    border-color: var(--accent);
    background: rgba(0, 113, 227, 0.06);
    box-shadow: var(--shadow-2), 0 0 0 4px rgba(0, 113, 227, 0.10);
}
.opt .ico { font-size: 22px; margin-bottom: 6px; }
.opt .ol { font-size: 13px; font-weight: 600; color: var(--label); }
.opt .od { font-size: 11px; color: var(--label-3); margin-top: 3px; line-height: 1.3; }

/* ─── BUTTONS ─── */
.btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 9px 18px;
    border: none;
    border-radius: var(--r-button);
    font-size: 13px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    transition: background 0.15s var(--ease-out), color 0.15s var(--ease-out), transform 0.1s var(--ease-out), box-shadow 0.15s var(--ease-out);
}
.btn:active { transform: scale(0.97); }
.btn-p { background: var(--accent); color: #fff; }
.btn-p:hover { background: var(--accent-hover); }
.btn-p:disabled { background: var(--bg-tertiary); color: var(--label-disabled); cursor: not-allowed; transform: none; }
.btn-g { background: var(--success); color: #fff; }
.btn-g:hover { filter: brightness(1.05); }
.btn-d { background: var(--error); color: #fff; }
.btn-d:hover { filter: brightness(1.05); }
.btn-o {
    background: var(--bg-secondary);
    color: var(--label-2);
    border: 1px solid var(--separator);
}
.btn-o:hover { color: var(--label); border-color: var(--separator-strong); }

/* ─── CHECKBOX-CARDS ─── */
.ck {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 14px;
    background: var(--bg-secondary);
    border: 1px solid var(--separator);
    border-radius: var(--r-input);
    cursor: pointer;
    transition: all 0.15s var(--ease-out);
    margin-bottom: 8px;
}
.ck:hover { border-color: var(--separator-strong); }
.ck.on {
    border-color: rgba(0, 200, 150, 0.50);
    background: rgba(0, 200, 150, 0.06);
}
.ck input[type=checkbox] {
    width: 18px; height: 18px;
    accent-color: var(--success);
    flex-shrink: 0;
    cursor: pointer;
}
.ck span { font-size: 13px; color: var(--label); }
.ck.on span { color: var(--success); }

/* ─── ALERTS / CALLOUTS ─── */
.al {
    border-radius: var(--r-input);
    padding: 12px 14px;
    margin-bottom: 14px;
    font-size: 13px;
    line-height: 1.5;
    display: flex;
    gap: 10px;
    align-items: flex-start;
}
.al .i { flex-shrink: 0; font-size: 15px; line-height: 1; margin-top: 1px; }
.aw { background: rgba(255,149,0,0.10);  color: var(--warning); }
.ad { background: rgba(255,59,48,0.10);  color: var(--error); }
.ai { background: rgba(0,113,227,0.08);  color: var(--accent); }
.ao { background: rgba(0,200,150,0.10);  color: var(--success); }
.ae { background: rgba(255,59,48,0.10);  color: var(--error); }

/* ─── SIDEBAR (Slide-In) ─── */
.sb {
    position: fixed;
    top: 0; right: 0;
    width: 340px;
    height: 100vh;
    background: var(--bg-secondary);
    border-left: 1px solid var(--separator);
    transform: translateX(100%);
    transition: transform 0.3s var(--ease-out);
    z-index: 100;
    overflow-y: auto;
    padding: 24px;
    box-shadow: var(--shadow-3);
}
.sb.open { transform: translateX(0); }
.sbo {
    position: fixed; inset: 0;
    background: rgba(0, 0, 0, 0.30);
    -webkit-backdrop-filter: blur(2px);
    backdrop-filter: blur(2px);
    z-index: 99;
    display: none;
}
.sbo.show { display: block; }
.dv { height: 1px; background: var(--separator); margin: 18px 0; }

/* ─── TICKET-EXPORT ─── */
.tk {
    border: 1px solid rgba(0, 200, 150, 0.45);
    border-radius: var(--r-card);
    padding: 22px;
    margin-top: 28px;
    background: var(--bg-secondary);
    box-shadow: var(--shadow-2);
}
.tg { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
.tc {
    background: var(--bg-primary);
    border-radius: 8px;
    padding: 10px 12px;
}
.tc .l {
    font-size: 9px;
    color: var(--label-3);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-weight: 600;
}
.tc .v {
    font-size: 12px;
    font-weight: 600;
    color: var(--label);
    margin-top: 2px;
    word-break: break-word;
}
.ar {
    display: grid;
    grid-template-columns: 90px 60px 1fr;
    gap: 6px;
    font-size: 10px;
    padding: 4px 0;
    border-bottom: 1px solid var(--separator);
}
.ar:last-child { border-bottom: none; }
.tk-section {
    background: var(--bg-primary);
    border: 1px solid var(--separator);
    border-radius: 8px;
    padding: 10px 12px;
    margin-bottom: 8px;
}
.tk-section .l { font-size: 9px; color: var(--label-3); text-transform: uppercase; font-weight: 600; }
.tk-section p { font-size: 11px; color: var(--label); margin-top: 3px; line-height: 1.4; }

/* ─── PRINT ─── */
@media print {
    body { background: #fff; color: #1d1d1f; }
    .no-print { display: none !important; }
    .jtl-gen { display: none !important; }
    .block, .tk, .tc, .al { border-color: #e5e5e7; background: #fafafa; box-shadow: none; }
    .tag { border: 1px solid #ddd; }
    .tk { padding: 18px; margin: 0; }
    .tg { gap: 4px; }
    .tc { padding: 6px 8px; }
    .ar { font-size: 8px; }
}
.pdf-export { max-width: 100% !important; padding: 16px !important; margin: 0 !important; }
.pdf-export .tg { grid-template-columns: repeat(4, 1fr); gap: 4px; }
.pdf-export .tc { padding: 5px 7px; }
.pdf-export .tc .l { font-size: 7px; }
.pdf-export .tc .v { font-size: 9px; margin-top: 1px; }
.pdf-export .ar { padding: 1px 0; font-size: 7px; grid-template-columns: 70px 45px 1fr; gap: 3px; }
.pdf-export .tk-section { padding: 6px 8px; margin-bottom: 4px; }
.pdf-export .tk-section .l { font-size: 7px; }
.pdf-export .tk-section p { font-size: 8px; margin-top: 1px; }
.pdf-export .tag { font-size: 8px; padding: 1px 5px; }
.pdf-export .audit-scroll { max-height: none !important; overflow: visible !important; }

/* ─── SCROLLBARS ─── */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(120, 120, 128, 0.3); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: rgba(120, 120, 128, 0.5); }

/* ─── DATEPICKER ─── */
.dp-wrap { position: relative; }
.dp-input { cursor: pointer !important; }
.dp-input:read-only { background: var(--bg-secondary); }
.dp {
    position: fixed;
    z-index: 1000;
    background: var(--bg-secondary);
    border: 1px solid var(--separator);
    border-radius: var(--r-card);
    padding: 14px;
    box-shadow: var(--shadow-pop);
    width: 296px;
    display: none;
}
.dp.show { display: block; }
.dp-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
}
.dp-head button {
    background: none;
    border: none;
    color: var(--label-2);
    cursor: pointer;
    padding: 6px 10px;
    border-radius: var(--r-button);
    font-size: 16px;
    transition: background 0.15s var(--ease-out);
}
.dp-head button:hover { background: var(--bg-tertiary); color: var(--label); }
.dp-title { font-size: 14px; font-weight: 600; color: var(--label); }
.dp-days { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; text-align: center; margin-bottom: 6px; }
.dp-days span { font-size: 11px; color: var(--label-3); padding: 4px; font-weight: 500; }
.dp-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
.dp-grid button {
    background: none;
    border: none;
    color: var(--label);
    padding: 8px 4px;
    border-radius: var(--r-button);
    cursor: pointer;
    font-size: 13px;
    font-family: inherit;
    transition: background 0.15s var(--ease-out);
}
.dp-grid button:hover { background: var(--bg-tertiary); }
.dp-grid button.today { box-shadow: inset 0 0 0 1.5px var(--accent); color: var(--accent); font-weight: 600; }
.dp-grid button.sel { background: var(--accent); color: #fff; font-weight: 600; }
.dp-grid button.other { color: var(--label-3); opacity: 0.5; }
.dp-grid button:disabled { opacity: 0.25; cursor: not-allowed; }
.dp-quick {
    display: flex;
    gap: 6px;
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid var(--separator);
}
.dp-quick button {
    flex: 1;
    background: var(--bg-tertiary);
    border: none;
    color: var(--label-2);
    padding: 7px;
    border-radius: var(--r-button);
    font-size: 11px;
    cursor: pointer;
    font-family: inherit;
    font-weight: 500;
    transition: all 0.15s var(--ease-out);
}
.dp-quick button:hover { background: var(--separator); color: var(--label); }

/* ─── DAILY (Tagescheckliste-Card) — D2 ─── */
.daily-card {
    margin-bottom: 18px;
    background: var(--bg-secondary);
    border: 1px solid var(--separator);
    border-radius: var(--r-card);
    padding: 16px 18px;
    box-shadow: var(--shadow-1);
}
.daily-head {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 12px;
}
.daily-head .h-title { font-size: 15px; font-weight: 600; color: var(--label); }
.daily-head .h-count { font-size: 12px; color: var(--label-3); }
.daily-tasks { display: flex; flex-wrap: wrap; gap: 8px; }
.daily-task {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 7px 12px;
    border-radius: var(--r-pill);
    border: 1px solid var(--separator);
    background: var(--bg-primary);
    color: var(--label-2);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s var(--ease-out);
}
.daily-task:hover { border-color: var(--separator-strong); color: var(--label); }
.daily-task.done {
    background: rgba(0, 200, 150, 0.10);
    color: var(--success);
    text-decoration: line-through;
    border-color: rgba(0, 200, 150, 0.30);
}
.daily-task .ico { font-size: 13px; line-height: 1; }

/* ─── NOTIFY-BADGE (D3a) ─── */
.notify-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 4px 10px;
    border-radius: var(--r-pill);
    font-size: 11px;
    font-weight: 500;
    font-family: inherit;
    border: 1px solid transparent;
    cursor: default;
    transition: all 0.15s var(--ease-out);
}
.notify-badge.granted {
    background: rgba(0, 200, 150, 0.10);
    color: var(--success);
    border-color: rgba(0, 200, 150, 0.25);
}
.notify-badge.enable {
    background: rgba(0, 113, 227, 0.08);
    color: var(--accent);
    border-color: rgba(0, 113, 227, 0.30);
    cursor: pointer;
}
.notify-badge.enable:hover {
    background: rgba(0, 113, 227, 0.14);
    border-color: var(--accent);
}

    if(S.stage===1) return 1;

    if(S.ticketOk) st[6]='done';
    if(S.va==='abholung') st[3]='skipped';
    else if(S.va==='lieferung') st[4]='skipped';
    const cur=activeBucket();
    if(st[cur]==='pending') st[cur]='active';
    return st;
}

    "todos_nach": "1. Rechnung aus ra@elvinci.de herunterladen und in der Teams Auftragskarte anhängen.\n\n2. Auftragsnummer und Rechnungsnummer im Titel der Aufgabe nach dem Kundennamen in Klammer ergänzen. Beispiel: \"IG INTERNATIONAL (AU2026013026567, RE2026013456783)\"\n\n3. Startdatum der Karte auf den Tag der Rechnungsstellung setzen.\n\n4. Fälligkeitsdatum der Karte auf den Tag der Abholung (=Kommissionierungstag + 1 Werktag) setzen.\n\n5. Die Auftragskarte an VERSANDPLANUNG / JANNA zuweisen.\n\n6. Die eigene Zuweisung auf der Karte entfernen\n\n7. Den Text rechts in den Chat zum Auftrag kopieren und auf \"SENDEN\" klicken.",

    "todos_nach": "1. Rechnung aus ra@elvinci.de herunterladen und in der Teams Auftragskarte anhängen.\n\n2. Auftragsnummer und Rechnungsnummer im Titel der Aufgabe nach dem Kundennamen in Klammer ergänzen. Beispiel: \"IG INTERNATIONAL (AU2026013026567, RE2026013456783)\"\n\n3. Startdatum der Karte auf den Tag der Rechnungsstellung setzen.\n\n4. Fälligkeitsdatum der Karte auf den Tag der Abholung (=Kommissionierungstag + 1 Werktag) setzen.\n\n5. Die Auftragskarte an VERSANDPLANUNG / JANNA zuweisen.\n\n6. Die eigene Zuweisung auf der Karte entfernen\n\n7. Den Text rechts in den Chat zum Auftrag kopieren und auf \"SENDEN\" klicken.",

function _migrateConfig(){

        if(!S.config[section]) S.config[section]={...fields};
        else Object.entries(fields).forEach(([key, val])=>{
            if(S.config[section][key]===undefined) S.config[section][key]=val;
        });
    });

// ═══════════════════════════════════════════════════════
// PERSISTENCE — D2 (Single-Order) + Tier 1.2 (Multi-Order)
// localStorage v2-Schema: { activeId, orders:{id->state}, globals:{config,weeklyReport,dailyChecks,notifyFired} }
// V1-Migration: existierender 'elvinci_S_v1'-Schlüssel wird beim ersten Boot in v2 überführt.
// ═══════════════════════════════════════════════════════
const STORAGE_KEY='elvinci_S_v1';      // legacy (nur lesen, für Migration)
const STORAGE_KEY_V2='elvinci_data_v2';
const STORAGE_VERSION_V2=2;

// Welche Felder sind GLOBAL (geteilt über alle Aufträge) und welche reine UI-State?
const _GLOBAL_KEYS=new Set(['config','weeklyReport','dailyChecks','notifyFired']);
const _UI_KEYS=new Set(['sbOpen','sbLeftOpen']); // werden nicht persistiert

let _ORDERS={};       // id → order-state
let _ACTIVE_ID=null;  // aktuell editierter Auftrag

function uuid(){
    if(typeof crypto!=='undefined' && crypto.randomUUID) return crypto.randomUUID();
    return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g,c=>{
        const r=Math.random()*16|0;
        return (c==='x'?r:(r&0x3|0x8)).toString(16);
    });
}

function _extractOrderFields(state){
    const out={};
    for(const k in state){
        if(_GLOBAL_KEYS.has(k)) continue;
        if(_UI_KEYS.has(k)) continue;
        out[k]=state[k];
    }
    return out;
}

function _resetOrderFields(){
    const PRESERVE=new Set([..._GLOBAL_KEYS, ..._UI_KEYS, 'id']);
    for(const k in S){
        if(PRESERVE.has(k)) continue;
        if(k==='audit'||k==='komm'||k==='done'){ S[k]=[]; continue; }
        if(k==='stage'||k==='sub'){ S[k]=0; continue; }
        if(Array.isArray(S[k])){
            S[k]=S[k].map(v=>typeof v==='boolean'?false:typeof v==='string'?'':v);
            continue;
        }
        if(typeof S[k]==='boolean'){ S[k]=false; continue; }
        if(typeof S[k]==='string'){ S[k]=''; continue; }
        if(S[k]&&typeof S[k]==='object'){ S[k]=null; continue; }
    }
    // Re-init bekannter Defaults
    S.genTodos=[false,false,false,false,false,false,false,false,false];
    S.audit=[]; S.komm=[]; S.done=[];
    S.jtlZZ='7';
    S.jtlAppointmentStatus='erfuellbar';
    // Wenn-Dann — geschachtelte Pflicht-Objekte zurücksetzen statt null
    S.jtlAbgleich={ mengen:false, versandart:false, zz:false };
    S.endChecklist={ teams:false, pipeline:false, sharepoint:false };
}

function _orderActiveBucket(o){
    if(o.ticketOk) return 6;
    if(o.stage===0) return 0;
    if(o.stage===1) return 1;
    if(o.stage===2) return 2;
    if(o.stage===3) return o.va==='abholung'?4:3;
    return 0;
}

function save(){
    try{
        if(S.id) _ORDERS[S.id]=_extractOrderFields(S);
        const blob={
            v:STORAGE_VERSION_V2, ts:new Date().toISOString(),
            activeId:_ACTIVE_ID, orders:_ORDERS,
            globals:{ config:S.config, weeklyReport:S.weeklyReport, dailyChecks:S.dailyChecks, notifyFired:S.notifyFired },
        };
        localStorage.setItem(STORAGE_KEY_V2, JSON.stringify(blob));
    }catch(e){ console.warn('Auto-Save fehlgeschlagen:', e); }
}

function loadDraft(){
    try{
        // V2 zuerst versuchen
        const rawV2=localStorage.getItem(STORAGE_KEY_V2);
        if(rawV2){
            const p=JSON.parse(rawV2);
            if(p.v===STORAGE_VERSION_V2){
                _ORDERS=p.orders||{};
                _ACTIVE_ID=p.activeId||null;
                if(p.globals) Object.assign(S, p.globals);
                if(_ACTIVE_ID && _ORDERS[_ACTIVE_ID]){
                    Object.assign(S, _ORDERS[_ACTIVE_ID]);
                    S.id=_ACTIVE_ID;
                } else if(Object.keys(_ORDERS).length){
                    // ActiveId verloren — nimm den ersten verfügbaren Auftrag
                    _ACTIVE_ID=Object.keys(_ORDERS)[0];
                    Object.assign(S, _ORDERS[_ACTIVE_ID]);
                    S.id=_ACTIVE_ID;
                } else {
                    // Keine Aufträge — neuen anlegen
                    S.id=uuid(); _ACTIVE_ID=S.id;
                }
                return p.ts;
            }
        }
        // V1-Migration
        const rawV1=localStorage.getItem(STORAGE_KEY);
        if(rawV1){
            const p=JSON.parse(rawV1);
            if(p.v===1 && p.s){
                const id=uuid();
                const order={}, globals={};
                for(const k in p.s){
                    if(_GLOBAL_KEYS.has(k)) globals[k]=p.s[k];
                    else if(!_UI_KEYS.has(k)) order[k]=p.s[k];
                }
                _ORDERS={ [id]: order };
                _ACTIVE_ID=id;
                Object.assign(S, globals);
                Object.assign(S, order);
                S.id=id;
                save(); // direkt v2 schreiben
                console.log('V1→V2 migriert für 1 Auftrag.');
                return p.ts;
            }
        }
    }catch(e){ console.warn('Draft-Load fehlgeschlagen:', e); }
    return false;
}

function clearDraft(){
    try{ localStorage.removeItem(STORAGE_KEY_V2); }catch(e){}
}

function newOrder(){
    if(!confirm('Neuen Auftrag anlegen?\n\nAktueller Auftrag wird automatisch gespeichert und in der Liste sichtbar.'))return;
    save(); // sichert aktuellen Stand in _ORDERS
    _resetOrderFields();
    S.id=uuid();
    _ACTIVE_ID=S.id;
    lg('Neuer Auftrag', S.id.slice(0,8));
    save();
    render();
    window.scrollTo({top:0,behavior:'smooth'});
}

function switchOrder(id){
    if(!_ORDERS[id]) return;
    if(id===S.id) return;
    save(); // aktuellen Stand sichern
    _resetOrderFields();
    Object.assign(S, _ORDERS[id]);
    S.id=id;
    _ACTIVE_ID=id;
    const o=_ORDERS[id];
    lg('Auftrag aktiv', (o.kunde||o.au||id.slice(0,8)));
    render();
    window.scrollTo({top:0,behavior:'smooth'});
}

function deleteOrder(id){
    const o=_ORDERS[id];
    if(!o) return;
    const label=o.kunde||o.au||id.slice(0,8);
    if(!confirm('Auftrag löschen: '+label+' ?\n\nAlle Auftragsdaten + Audit-Log gehen verloren. Adressen / Wochenreport bleiben.'))return;
    delete _ORDERS[id];
    if(id===S.id){
        // Aktiver Auftrag gelöscht — auf nächsten umschalten oder leeren neuen anlegen
        const remaining=Object.keys(_ORDERS);
        if(remaining.length){
            const nextId=remaining[0];
            _resetOrderFields();
            Object.assign(S, _ORDERS[nextId]);
            S.id=nextId;
            _ACTIVE_ID=nextId;
        }else{
            _resetOrderFields();
            S.id=uuid();
            _ACTIVE_ID=S.id;
        }
    }
    lg('Auftrag gelöscht', label);
    save();
    render();
}

function exportBackup(){
    save(); // aktuellsten Stand mit aufnehmen
    const fn=`elvinci_backup_full_${new Date().toISOString().slice(0,10)}.json`;
    const blob_={
        v:STORAGE_VERSION_V2, ts:new Date().toISOString(),
        activeId:_ACTIVE_ID, orders:_ORDERS,
        globals:{ config:S.config, weeklyReport:S.weeklyReport, dailyChecks:S.dailyChecks, notifyFired:S.notifyFired },
    };
    const blob=new Blob([JSON.stringify(blob_,null,2)], {type:'application/json'});
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download=fn;
    a.click();
    URL.revokeObjectURL(a.href);
    lg('Backup exportiert', `${Object.keys(_ORDERS).length} Aufträge → ${fn}`);
    render();
}

function importBackup(file){
    const r=new FileReader();
    r.onload=(e)=>{
        try{
            const p=JSON.parse(e.target.result);
            // V2-Backup
            if(p.v===STORAGE_VERSION_V2 && p.orders){
                if(!confirm(`Aktuellen Stand mit Backup vom ${new Date(p.ts).toLocaleString('de-DE')} überschreiben?\n\nBackup enthält ${Object.keys(p.orders).length} Aufträge — alle aktuellen lokalen Aufträge werden ersetzt.`))return;
                _ORDERS=p.orders;
                _ACTIVE_ID=p.activeId;
                if(p.globals) Object.assign(S, p.globals);
                if(_ACTIVE_ID && _ORDERS[_ACTIVE_ID]){
                    _resetOrderFields();
                    Object.assign(S, _ORDERS[_ACTIVE_ID]);
                    S.id=_ACTIVE_ID;
                }
                save();
                lg('Backup importiert', `${Object.keys(_ORDERS).length} Aufträge aus ${file.name}`);
                render();
                return;
            }
            // V1-Backup (Single-Order) — als neuer Auftrag importieren
            if(p.v===1 && p.s){
                if(!confirm(`V1-Backup erkannt (Single-Order). Als neuer Auftrag in die Liste übernehmen?`))return;
                save(); // current first
                const id=uuid();
                const order={};
                for(const k in p.s){
                    if(_GLOBAL_KEYS.has(k)) continue;
                    if(_UI_KEYS.has(k)) continue;
                    order[k]=p.s[k];
                }
                _ORDERS[id]=order;
                _resetOrderFields();
                Object.assign(S, order);
                S.id=id;
                _ACTIVE_ID=id;
                save();
                lg('V1-Backup importiert', file.name);
                render();
                return;
            }
            alert('Backup-Datei nicht erkannt (Version: '+(p.v||'?')+').');
        }catch(err){ alert('Backup-Datei konnte nicht gelesen werden: '+err.message); }
    };
    r.readAsText(file);
}

function triggerImport(){
    const inp=document.createElement('input');
    inp.type='file';
    inp.accept='.json,application/json';
    inp.onchange=(e)=>{ if(e.target.files[0]) importBackup(e.target.files[0]); };
    inp.click();
}

function notifyAvailable(){ return typeof Notification!=='undefined'; }
function notifyPermission(){ return notifyAvailable() ? Notification.permission : 'unsupported'; }

async function notifyRequest(){
    if(!notifyAvailable()){ alert('Browser unterstützt keine Benachrichtigungen.'); return; }
    if(Notification.permission==='granted'){ render(); return; }
    if(Notification.permission==='denied'){
        alert('Benachrichtigungen sind im Browser blockiert. Bitte in den Browser-Einstellungen für diese Seite freigeben (Schloss-Symbol in der Adressleiste).');
        return;
    }
    const result=await Notification.requestPermission();
    lg('Notifications-Permission', result);
    if(result==='granted'){
        try{ new Notification('elvinci · Erinnerungen aktiv', { body:'Du wirst zu Sync-Slots und Wochenreport erinnert.', tag:'init' }); }catch(e){}
        notifyStart();
    }
    render();
}

function _firedToday(){
    if(!S.notifyFired || S.notifyFired.date !== _todayKey()){
        S.notifyFired={ date:_todayKey(), slots:{} };
    }
    return S.notifyFired.slots;
}

function _shouldFire(slot, now){
    if(slot.onlyDay !== undefined && slot.onlyDay !== now.getDay()) return false;
    const tasks=getDailyChecks();
    if(tasks[slot.taskId]) return false;          // schon erledigt
    const fired=_firedToday();
    if(fired[slot.id]) return false;              // heute schon benachrichtigt
    const slotMin=slot.hour*60 + slot.minute;
    const nowMin=now.getHours()*60 + now.getMinutes();
    return nowMin >= slotMin && nowMin <= slotMin + slot.windowMin;
}

function notifyCheck(){
    if(notifyPermission()!=='granted') return;
    const now=new Date();
    NOTIFY_SLOTS.forEach(slot=>{
        if(_shouldFire(slot, now)){
            try{
                new Notification('elvinci · '+slot.label, {
                    body:'Tagespflicht ist fällig — bitte erledigen oder als erledigt markieren.',
                    tag:slot.id,
                    requireInteraction:false,
                });
                _firedToday()[slot.id]=new Date().toISOString();
                lg('Erinnerung gesendet', slot.label);
                save();
            }catch(e){ console.warn('Notification failed:', e); }
        }
    });
}

function notifyStart(){
    if(_notifyTimer) clearInterval(_notifyTimer);
    notifyCheck();
    _notifyTimer=setInterval(notifyCheck, 60*1000);
}

// (Empfänger jetzt aus S.config.report.to — D3c)

function _kw(date){
    // ISO 8601 Kalenderwoche
    const d=new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
    const dayNum=d.getUTCDay()||7;
    d.setUTCDate(d.getUTCDate()+4-dayNum);
    const yearStart=new Date(Date.UTC(d.getUTCFullYear(),0,1));
    return Math.ceil(((d-yearStart)/86400000+1)/7);
}

function _weekStart(){
    const now=new Date();
    const ws=new Date(now);
    const dow=now.getDay()||7; // Sonntag=0 → 7
    ws.setDate(now.getDate()-dow+1);
    ws.setHours(0,0,0,0);
    return ws;
}

function _weekFilter(entries){
    const ws=_weekStart();
    return (entries||[]).filter(e=>{
        const m=e.ts.match(/^(\d{2})\.(\d{2})\.(\d{4}),\s*(\d{2}):(\d{2})$/);
        if(!m) return false;
        const d=new Date(+m[3], +m[2]-1, +m[1], +m[4], +m[5]);
        return d>=ws;
    });
}

function generateWeeklyReport(){
    const now=new Date();
    const weekAudit=_weekFilter(S.audit);
    const escalations=weekAudit.filter(e=>e.a==='Eskalation');
    const bucketChanges=weekAudit.filter(e=>e.a==='Stufe abgeschlossen');
    const reminders=weekAudit.filter(e=>e.a==='Erinnerung gesendet');
    const dailyDone=Object.values(getDailyChecks()).filter(v=>v).length;
    return { kw:_kw(now), now, weekAudit, escalations, bucketChanges, reminders, dailyDone };
}

// FIXTERMIN MACHBARKEITSPRÜFUNG
// ═══════════════════════════════════════════════════════
function rFixMachbarkeit() {
    const fixDate = new Date(S.fixDatum);
    const heute = new Date();
    heute.setHours(0,0,0,0);
    
    // Berechne Arbeitstage bis Fixtermin (ohne Wochenenden)
    let arbeitstage = 0;
    let checkDate = new Date(heute);
    while(checkDate < fixDate) {
        checkDate.setDate(checkDate.getDate() + 1);
        const day = checkDate.getDay();
        if(day !== 0 && day !== 6) arbeitstage++; // Mo-Fr
    }
    
    // Mindestens 3 Arbeitstage nötig (2 Tage Kommi-Vorlauf + 1 Tag Versand)
    const minArbeitstage = 3;
    const isMachbar = arbeitstage >= minArbeitstage;
    
    // Berechne spätestes Kommidatum (2 Arbeitstage vor Fixtermin)
    let kommiDate = new Date(fixDate);
    let kommiVorlauf = 2;
    while(kommiVorlauf > 0) {
        kommiDate.setDate(kommiDate.getDate() - 1);
        const day = kommiDate.getDay();
        if(day !== 0 && day !== 6) kommiVorlauf--;
    }
    const kommiFormatted = kommiDate.toLocaleDateString('de-DE', {weekday:'short', day:'2-digit', month:'2-digit', year:'numeric'});
    const fixFormatted = fixDate.toLocaleDateString('de-DE', {weekday:'short', day:'2-digit', month:'2-digit', year:'numeric'});
    
    let h = `<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px">
        <div style="background:var(--bg);padding:10px;border-radius:6px;border:1px solid var(--bd)">
            <div style="font-size:10px;color:var(--txd);text-transform:uppercase">Gewünschter Liefertermin</div>
            <div style="font-size:14px;font-weight:700;color:var(--txb);margin-top:4px">📅 ${fixFormatted}</div>
        </div>
        <div style="background:var(--bg);padding:10px;border-radius:6px;border:1px solid var(--bd)">
            <div style="font-size:10px;color:var(--txd);text-transform:uppercase">Arbeitstage verfügbar</div>
            <div style="font-size:14px;font-weight:700;color:${isMachbar ? 'var(--green)' : 'var(--red)'};margin-top:4px">${arbeitstage} Tage ${isMachbar ? '✓' : '✗'}</div>
        </div>
    </div>`;
    
    if(isMachbar) {
        h += `<div class="al ao" style="margin-bottom:12px">
            <div class="i">✓</div>
            <div>
                <strong style="color:var(--green)">Termin ist machbar!</strong><br>
                <span style="font-size:11px;color:var(--tx)">Späteste Kommissionierung: <strong>${kommiFormatted}</strong></span>
            </div>
        </div>`;
        
        if(!S.fixMachbarGeprueft) {
            h += `<button onclick="S.fixMachbarGeprueft=true;S.fixMachbar=true;render()" class="btn btn-g" style="width:100%">✓ Machbarkeit bestätigen & Fixtermin zusagen</button>`;
        } else {
            h += `<div style="background:rgba(46,160,67,0.1);border:1px solid var(--green);border-radius:6px;padding:10px;text-align:center">
                <span style="color:var(--green);font-weight:600">✅ Fixtermin ${fixFormatted} bestätigt</span>
            </div>`;
        }
    } else {
        h += `<div class="al ae" style="margin-bottom:12px">
            <div class="i">✗</div>
            <div>
                <strong style="color:var(--red)">Termin NICHT machbar!</strong><br>
                <span style="font-size:11px;color:var(--tx)">Es werden mindestens <strong>${minArbeitstage} Arbeitstage</strong> benötigt (2 Tage Kommi + 1 Tag Versand).</span>
            </div>
        </div>`;
        
        // Nächstmöglichen Termin berechnen
        let naechsterTermin = new Date(heute);
        let tageHinzu = 0;
        while(tageHinzu < minArbeitstage) {
            naechsterTermin.setDate(naechsterTermin.getDate() + 1);
            const day = naechsterTermin.getDay();
            if(day !== 0 && day !== 6) tageHinzu++;
        }
        const naechsterFormatted = naechsterTermin.toLocaleDateString('de-DE', {weekday:'short', day:'2-digit', month:'2-digit', year:'numeric'});
        
        h += `<div class="al ai">
            <div class="i">💡</div>
            <div style="font-size:11px">
                <strong>Frühestmöglicher Termin:</strong> ${naechsterFormatted}<br>
                Bitte dem Kunden diesen alternativen Termin vorschlagen.
            </div>
        </div>`;
    }
    
    return h;
}

// JTL Text Generator Functions
function findJTLText(params) {
    // Normalize comparison values to strings to avoid type coercion bugs.
    // Counter dimension was removed (Stand 2026-05-04) — Kunden steigen nicht mehr im Zahlungsziel.
    const heberStr = params.hebebuehne ? 'mit' : 'ohne';
    const zzStr = params.zahlungsziel != null ? String(params.zahlungsziel) : null;
    return JTL_DATA.find(s => {
        if (s.versandart !== params.versandart) return false;
        if (s.terminwunsch !== params.terminwunsch) return false;
        if (params.terminwunsch === 'mit' && s.terminwunsch_status !== params.terminwunsch_status) return false;
        if (params.versandart === 'Lieferung' && s.hebebuehne !== heberStr) return false;
        if (s.zahlungsart !== params.zahlungsart) return false;
        if (params.zahlungsart === 'ZAHLUNGSZIEL' && String(s.zahlungsziel) !== zzStr) return false;
        return true;
    }) || null;
}

function generateJTLText() {
    const params = {
        versandart: isSp() ? 'Lieferung' : 'Abholung',
        terminwunsch: S.jtlHasAppointment ? 'mit' : 'ohne',
        terminwunsch_status: S.jtlAppointmentStatus,
        hebebuehne: S.jtlHasRamp,
        zahlungsart: (S.za === 'vorkasse' || S.za === 'barzahler') ? 'VORKASSE' : 'ZAHLUNGSZIEL',
        zahlungsziel: S.jtlZZ
    };
    S.jtlResult = findJTLText(params);
    
    // Kombi-Auftrag: Zusätzliche Zeile zum JTL-Text hinzufügen (am Anfang, auf Englisch)
    if (S.isKombi && S.jtlResult && S.jtlResult.jtl_text) {
        const kombiZeile = 'We have merged orders [KOMBI_AU_NUMMERN] in this invoice.\n\n';
        S.jtlResult = { ...S.jtlResult, jtl_text: kombiZeile + S.jtlResult.jtl_text };
    }
    
    // Sondervereinbarung: Customer-facing Legal-Klausel — NACH KOMBI (KOMBI = Faktum, Sonder = Vertragsklausel)
    if (S.isSonderverein && S.jtlResult && S.jtlResult.jtl_text) {

// Terminrechner Functions
function addWorkdays(startDate, days) {
    let result = new Date(startDate);
    let added = 0;
    while (added < days) {
        result.setDate(result.getDate() + 1);
        const dow = result.getDay();
        if (dow !== 0 && dow !== 6) added++;
    }
    return result;
}

function parseLieferzeitRange(val) {
    if (!val) return {min: 0, max: 0};
    const parts = val.split('-');
    if (parts.length === 2) {
        return {min: parseInt(parts[0]) || 0, max: parseInt(parts[1]) || 0};
    }
    const single = parseInt(val) || 0;
    return {min: single, max: single};
}

function calcLiefertermin() {
    if (!S.tpKommiDatum || !S.tpLieferzeit) return null;
    const kommi = new Date(S.tpKommiDatum);
    const range = parseLieferzeitRange(S.tpLieferzeit);
    if (range.max <= 0) return null;
    return addWorkdays(kommi, range.max);
}

function calcLieferterminRange() {
    if (!S.tpKommiDatum || !S.tpLieferzeit) return null;
    const kommi = new Date(S.tpKommiDatum);
    const range = parseLieferzeitRange(S.tpLieferzeit);
    if (range.max <= 0) return null;
    return {
        min: addWorkdays(kommi, range.min),
        max: addWorkdays(kommi, range.max)
    };
}

function formatDateDE(d) {
    if (!d) return '—';
    return d.toLocaleDateString('de-DE', {weekday:'short', day:'2-digit', month:'2-digit', year:'numeric'});
}

function formatDateShort(d) {
    if (!d) return '—';
    return d.toLocaleDateString('de-DE', {weekday:'short', day:'2-digit', month:'2-digit'});
}

function formatLieferterminTicket() {
    const range = calcLieferterminRange();
    if (!range) return S.tpLieferzeit ? S.tpLieferzeit + ' WT' : '—';
    if (range.min.getTime() === range.max.getTime()) {
        return formatDateShort(range.max);
    }
    return formatDateShort(range.min) + ' – ' + formatDateShort(range.max);
}

// Datepicker Functions
let dpOpen = null;
const dpMonths = ['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];
const dpDays = ['Mo','Di','Mi','Do','Fr','Sa','So'];

function closeDp() {
    if(dpOpen) {
        const el = document.getElementById(dpOpen);
        if(el) el.classList.remove('show');
        dpOpen = null;
    }
}

function toggleDp(id) {
    if(dpOpen === id) { closeDp(); return; }
    closeDp();
    dpOpen = id;
    renderDp(id);
    const el = document.getElementById(id);
    const wrap = el?.closest('.dp-wrap');
    const input = wrap?.querySelector('.dp-input');
    if(el && input) {
        const rect = input.getBoundingClientRect();
        let top = rect.bottom + 4;
        let left = rect.left;
        // Ensure calendar doesn't go off-screen
        if(top + 350 > window.innerHeight) top = rect.top - 350;
        if(left + 280 > window.innerWidth) left = window.innerWidth - 290;
        if(left < 10) left = 10;
        el.style.top = top + 'px';
        el.style.left = left + 'px';
        el.classList.add('show');
    }
}

function renderDp(id) {
    const el = document.getElementById(id);
    if(!el) return;
    const field = el.dataset.field;
    const currentVal = S[field];
    const viewDate = el.dataset.view ? new Date(el.dataset.view) : (currentVal ? new Date(currentVal) : new Date());
    const today = new Date(); today.setHours(0,0,0,0);
    const selected = currentVal ? new Date(currentVal) : null;
    if(selected) selected.setHours(0,0,0,0);
    
    const year = viewDate.getFullYear();
    const month = viewDate.getMonth();
    const firstDay = new Date(year, month, 1);
    const lastDay = new Date(year, month + 1, 0);
    const startDay = (firstDay.getDay() + 6) % 7; // Monday = 0
    
    let h = `<div class="dp-head">
        <button onclick="dpNav('${id}',-1)">◀</button>
        <span class="dp-title">${dpMonths[month]} ${year}</span>
        <button onclick="dpNav('${id}',1)">▶</button>
    </div>
    <div class="dp-days">${dpDays.map(d=>`<span>${d}</span>`).join('')}</div>
    <div class="dp-grid">`;
    
    // Previous month days
    const prevMonth = new Date(year, month, 0);
    for(let i = startDay - 1; i >= 0; i--) {
        const d = prevMonth.getDate() - i;
        h += `<button class="other" disabled>${d}</button>`;
    }
    
    // Current month days
    for(let d = 1; d <= lastDay.getDate(); d++) {
        const date = new Date(year, month, d);
        const isToday = date.getTime() === today.getTime();
        const isSel = selected && date.getTime() === selected.getTime();
        const cls = (isToday ? 'today ' : '') + (isSel ? 'sel' : '');
        const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        h += `<button class="${cls}" onclick="dpSelect('${id}','${dateStr}')">${d}</button>`;
    }
    
    // Next month days
    const remaining = 42 - (startDay + lastDay.getDate());
    for(let d = 1; d <= remaining && d <= 7; d++) {
        h += `<button class="other" disabled>${d}</button>`;
    }
    
    h += `</div>
    <div class="dp-quick">
        <button onclick="dpSelect('${id}','today')">Heute</button>
        <button onclick="dpSelect('${id}','tomorrow')">Morgen</button>
        <button onclick="dpSelect('${id}','nextweek')">Nächste Wo.</button>
    </div>`;
    
    el.innerHTML = h;
}

function dpNav(id, dir) {
    const el = document.getElementById(id);
    if(!el) return;
    const currentVal = S[el.dataset.field];
    const viewDate = el.dataset.view ? new Date(el.dataset.view) : (currentVal ? new Date(currentVal) : new Date());
    viewDate.setMonth(viewDate.getMonth() + dir);
    el.dataset.view = viewDate.toISOString();
    renderDp(id);
}

function dpSelect(id, val) {
    const el = document.getElementById(id);
    if(!el) return;
    const field = el.dataset.field;
    const logLabel = el.dataset.log;
    let date;
    if(val === 'today') date = new Date();
    else if(val === 'tomorrow') { date = new Date(); date.setDate(date.getDate() + 1); }
    else if(val === 'nextweek') { date = new Date(); date.setDate(date.getDate() + 7); }
    else date = new Date(val);
    
    const dateStr = `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`;
    S[field] = dateStr;
    if(logLabel) lg(logLabel, formatDateDE(date));
    closeDp();
    render();
}

        case 0:return S.au.trim().length>5&&S.kunde.trim().length>1;
        case 1:return !!S.za&&(!isFix()||S.fixDatum);
        case 2:return !!S.va&&(!isSp()||S.frachtkosten.trim()); // Bei Lieferung: Frachtkosten Pflicht
        case 3:return !!S.artAnz;
        case 4:return(!isZoll()||!!S.zielland)&&(!S.isSonder||S.sonderText.trim().length>5);
        case 5:
            // Kommissionierungsdatum Pflicht nur bei Prio 1 (Zahlungsziel, Fixtermin, Zoll)
            // Bei Vorkasse und Barzahler (Prio 2) optional - können sich verschieben
            if(S.za==='vorkasse'||S.za==='barzahler')return true;
            if(!S.tpKommiDatum) return false;
            // Fixtermin: Mindestens 2 Tage Puffer zwischen Kommi und Liefertermin
            if(isFix() && S.fixDatum && S.tpKommiDatum) {
                const fixDate = new Date(S.fixDatum);
                const kommiDate = new Date(S.tpKommiDatum);
                const diffTage = Math.round((fixDate - kommiDate) / (1000 * 60 * 60 * 24));
                if(diffTage < 2) {
                    // Override möglich mit Vorgesetzten-Freigabe
                    if(S.fixOverride && S.fixOverrideVon) return true;
                    return false; // Blockieren!
                }
            }
            return true;
        default:return false;
    }
}
function confirmSub(i){
    if(!subOk(i))return;
    if(i===0){S.isKombi=S.au.includes(',')||S.au.includes('+')||S.au.toLowerCase().includes('und');lg('Auftrag erfasst',S.au+' — '+S.kunde)}
    if(i===1){if(S.za==='zoll')S.isZoll=true;lg('Zahlungsart',z().l+' (Prio '+z().p+')');if(isFix())lg('Fixtermin',S.fixDatum)}
    if(i===2){lg('Versandart',VS[S.va].l);if(isSp())lg('Frachtkosten',S.frachtkosten)}
    if(i===3)lg('Artikel',S.artAnz+' Stk'+(S.pal?' / '+S.pal+' Pal':''));
    if(i===4){
        if(isZoll()&&S.za!=='zoll')lg('Merkmal','Zoll — '+S.zielland);
        if(S.za==='zoll')lg('Zoll-Zielland',S.zielland);
        if(S.isLoose)lg('Merkmal','Loose Beladung'+(S.looseInfo?' — '+S.looseInfo:''));
        if(S.isKlein)lg('Merkmal','Kleingerätepaletten');
        if(S.isSonder)lg('Merkmal','Sonderfall: '+S.sonderText.slice(0,60));
        if(S.isSonderverein)lg('Merkmal','Sondervereinbarung mit Kunde');
    }
    if(i===5){
        if(S.tpKommiDatum)lg('Kommissionierung',fmtD(S.tpKommiDatum));

        if(S.besonderes)lg('Vereinbarung',S.besonderes.slice(0,60));

        if(S.fixOverride && S.fixOverrideVon){
            lg('⚠️ OVERRIDE','Fixtermin-Puffer unterschritten — Freigabe durch: '+S.fixOverrideVon);

    }
    S.sub=i+1;render();
}

// STAGE ADVANCE
// ═══════════════════════════════════════════════════════
// Wenn-Dann-Logik — alle Pflichten pro Stage als strukturierte Liste.
// canAdv() wird zu getGates().allOk; UI rendert die Liste live (rGates).
// Hart, kein Override (User-Entscheidung 2026-05-04). Hinweis-Texte zeigen
// Janna direkt wo sie den Pflicht-Schritt erfüllen muss.
function getGates(){
    const gates=[], i=S.stage;
    const allTodosDone=genTodosCount()===getActiveGenTodos().length;

    if(i===0){
        // Stage 0 — Erfassung (Bucket „verkauf")
        gates.push({ label:'Alle Erfassungs-Schritte (Sub 0–6) durchlaufen', ok:S.sub>=6, hint:'Klick durch alle Sub-Stages oben durch' });
        gates.push({ label:'Auftragsnummer (AU)', ok:!!S.au, hint:'„AU…"-Feld in Sub 0 ausfüllen' });
        gates.push({ label:'Kunde', ok:!!S.kunde });
        gates.push({ label:'Versandart gewählt', ok:!!S.va });
        gates.push({ label:'Zahlungsart gewählt', ok:!!S.za });
        gates.push({ label:'Artikelanzahl', ok:!!S.artAnz });
        if(isZoll()) gates.push({ label:'Zoll-Zielland', ok:!!S.zielland });
        if(S.isSonder) gates.push({ label:'Sonderfall begründet (>5 Zeichen)', ok:S.sonderText.trim().length>5 });
        if(isFix()) gates.push({ label:'Fixtermin-Datum gesetzt', ok:!!S.fixDatum });
        if(S.isLoose) gates.push({ label:'Loose: Beladungshinweis', ok:!!S.looseInfo });
    }
    else if(i===1){
        // Stage 1 — Rechnung (Bucket „rechnung")
        if(isZoll()){
            // Zoll-Sonderlogik: RE kommt nach LKW-Beladung — bei Lieferung trotzdem Frachtkosten
            if(isSp()) gates.push({ label:'Frachtkosten im JTL-Auftrag ergänzt', ok:S.frachtOk });
        } else {
            if(isSp()){
                gates.push({ label:'Frachtkosten geklärt', ok:S.frachtOk });
                if(S.tpKommiDatum && !isFix()){
                    gates.push({ label:'Lieferzeit gesetzt (Terminrechner)', ok:!!S.tpLieferzeit });
                }
            }
            gates.push({ label:'Rechnung erstellt + versendet', ok:S.reOk });
            gates.push({ label:'RE-Nummer eingetragen', ok:!!S.re });
        }
        gates.push({ label:'JTL-Match generiert', ok:!!S.jtlResult, hint:'„Passenden Text finden" im JTL-Generator klicken' });
        gates.push({ label:'JTL-Abgleich: Mengen ✓', ok:!!S.jtlAbgleich?.mengen, hint:'Saleskärtchen ↔ JTL — Stückzahl prüfen' });
        gates.push({ label:'JTL-Abgleich: Versandart ✓', ok:!!S.jtlAbgleich?.versandart, hint:'Saleskärtchen ↔ JTL — Abholung/Spedition prüfen' });
        gates.push({ label:'JTL-Abgleich: Zahlungsziel ✓', ok:!!S.jtlAbgleich?.zz, hint:'Saleskärtchen ↔ JTL — ZZ/Vorkasse/Barzahler prüfen' });
        gates.push({ label:'Rechnungs-PDF in Teamskärtchen angehängt', ok:!!S.rePdfAttached, hint:'„📎 Rechnung angehängt"-Knopf klicken (setzt Audit-Eintrag)' });
    }
    else if(i===2){
        // Stage 2 — Kommi (Bucket „kommi")
        gates.push({ label:'Kommissionierungs-Datum gesetzt', ok:!!S.kDat });
        gates.push({ label:'Kapazität bestätigt', ok:S.kapOk });
        if(isFix() && S.fixDatum){
            const ok = S.fixPruefung==='machbar' || (S.fixPruefung==='nicht_machbar' && !!S.fixAlternworfen);
            gates.push({ label:'Fixtermin-Machbarkeit geprüft', ok, hint:'„Machbar" oder „Nicht machbar + Alternativdatum" wählen' });
        }
    }
    else if(i===3){
        // Stage 3 — AMM-Anmeldung (Buckets „versand"/„abholung"/„angemeldet"/„beendet")
        gates.push({ label:'Alle generellen TODOs erledigt', ok:allTodosDone });
        if(isSp()){
            gates.push({ label:'Versanddatum gesetzt', ok:!!S.vDat, hint:'In Erfassung Sub 5 oder hier nachholen' });
            gates.push({ label:'Palettenanzahl', ok:!!S.pal });
            gates.push({ label:'Warenwert eingetragen', ok:!!S.warenwert, hint:'Pflicht für AMM/Zoll-Anmeldung' });
            gates.push({ label:'AMM-Mail abgeschickt (Audit)', ok:!!S.ammMailSent, hint:'Action-Dock → 📧 AMM-Mail klicken' });
        } else if(isAbh()){
            gates.push({ label:'Abholtermin abgestimmt', ok:!!S.aTerm });
            gates.push({ label:'Kunde kontaktiert (Tag oder Anruf-Audit)', ok:S.isKontaktiert, hint:'Tag „Kontaktiert" setzen oder Eskalation/Anruf-Audit' });
        }
        if(isZoll()){
            gates.push({ label:'Zollagent-Mail abgeschickt (Audit)', ok:!!S.zollMailSent, hint:'Action-Dock → 🌍 Zollagent klicken' });
            gates.push({ label:'LKW-Beladung dokumentiert', ok:S.lkwOk });
            gates.push({ label:'Finale Zoll-Rechnung (RE-Nr nach Beladung)', ok:!!S.reZoll });
        }
        if(!needsPayBefore()){
            gates.push({ label:'AMM-Anmeldung bestätigt', ok:S.ammAngemeldet });
        }
        gates.push({ label:'Bezahlt-Status gesetzt', ok:S.bezahlt, hint:'Häkchen oder Eskalation an Dustin bei Zahlungs-Verzug' });
        // End-of-Order-Check (Kapitel 6 + 6.6)
        gates.push({ label:'Teamskärtchen geschlossen', ok:!!S.endChecklist?.teams, hint:'Im Planner Karte auf „Beendet" verschieben' });
        gates.push({ label:'Pipeline-Excel auf „erledigt"', ok:!!S.endChecklist?.pipeline, hint:'Spalten N + Q (bezahlt + erledigt) in der SharePoint-Excel' });
        gates.push({ label:'SharePoint-Ablage komplett', ok:!!S.endChecklist?.sharepoint, hint:'Rechnung, Lieferschein, Mailverkehr abgelegt' });
    }

    const open=gates.filter(g=>!g.ok).length;
    return { gates, allOk:open===0, openCount:open, doneCount:gates.length-open, total:gates.length };
}

function canAdv(){ return getGates().allOk; }

function adv(){
    if(!canAdv())return;
    S.done[S.stage]=true;
    lg('Stufe abgeschlossen',ST[S.stage].l);
    if(S.stage===ST.length-1){S.ticketOk=true;lg('Workflow abgeschlossen','Ticket generiert');render();setTimeout(()=>document.getElementById('ticket')?.scrollIntoView({behavior:'smooth',block:'start'}),150);return}
    S.stage++;
    // Auto-skip Stage 2 (Kommissionierungsplanung) - NICHT bei Fixtermin!
    if(S.stage===2 && !isFix()){
        const isPrio2 = S.za==='vorkasse'||S.za==='barzahler';
        if(S.tpKommiDatum){
            // Kommissionierungsdatum bereits in Stage 0 erfasst - übernehmen und überspringen
            S.kDat=S.tpKommiDatum;
            S.kapOk=true;
            S.done[2]=true;
            lg('Übersprungen','Kommissionierungsplanung (Datum: '+fmtD(S.tpKommiDatum)+')');
            S.stage++;
        } else if(isPrio2){
            // Prio 2 ohne Datum - bei Kapazität einplanen
            S.kapOk=true;
            S.done[2]=true;
            lg('Übersprungen','Kommissionierungsplanung (Prio 2 - bei Kapazität)');
            S.stage++;
        }
    }
    render();
    setTimeout(()=>document.getElementById('cs')?.scrollIntoView({behavior:'smooth',block:'start'}),100);
}
function back(){
    if(S.stage<=0)return;S.done[S.stage]=false;S.stage--;
    while(S.stage>0&&S.done[S.stage]&&isSkip(S.stage))S.stage--;
    render();
}
function isSkip(i){
    const isPrio2 = S.za==='vorkasse'||S.za==='barzahler';
    // Fixtermin: Stage 2 NIE überspringen (Machbarkeitsprüfung nötig)
    if(isFix()) return false;
    if(i===2&&(S.tpKommiDatum||isPrio2))return true; // Kommissionierungsdatum bereits erfasst oder Prio 2
    return false;
}
function rst(){
    if(!confirm('Workflow komplett zurücksetzen?\n\nAdressen, Wochenreport-Notizen und Tagespflichten bleiben erhalten — nur Auftragsdaten + Audit + Kommentare werden gelöscht.\n\n(Backup-Datei vorher speichern empfohlen.)'))return;
    // D3d — Preserve-Set: was darf NICHT gelöscht werden, weil's nicht auftrags-spezifisch ist
    const PRESERVE=new Set(['config','weeklyReport','dailyChecks','notifyFired']);
    for(const k in S){
        if(PRESERVE.has(k)) continue;
        if(k==='audit'||k==='komm'||k==='done'){ S[k]=[]; continue; }
        if(k==='stage'||k==='sub'){ S[k]=0; continue; }
        if(Array.isArray(S[k])){
            S[k]=S[k].map(v=>typeof v==='boolean'?false:typeof v==='string'?'':v);
            continue;
        }
        if(typeof S[k]==='boolean'){ S[k]=false; continue; }
        if(typeof S[k]==='string'){ S[k]=''; continue; }
        if(S[k]&&typeof S[k]==='object'){ S[k]=null; continue; }
    }
    lg('Workflow zurückgesetzt', 'Adressen + Wochenreport + Tagespflichten bleiben');
    // KEIN clearDraft() — render() ruft save() am Ende und schreibt den teil-gereseten State zurück.
    // Sonst würden Config/WeeklyReport beim nächsten F5 auf Defaults zurückfallen.
    render();
    window.scrollTo({top:0,behavior:'smooth'});
}

        notifyBadge=`<span class="notify-badge denied" title="Im Browser für diese Seite blockiert — Schloss-Symbol in der Adressleiste anklicken zum Freigeben">🔕 blockiert</span>`;

function rOrderList(){
    const orderList=Object.entries(_ORDERS).map(([id, o])=>{
        const lastEntry=(o.audit&&o.audit.length)?o.audit[o.audit.length-1]:null;
        return {
            id,
            kunde: o.kunde||'— ohne Kunde —',
            au: o.au||'— ohne AU —',
            bucket: _orderActiveBucket(o),
            lastTs: lastEntry?lastEntry.ts:'',
            ticketOk: !!o.ticketOk,
        };
    });
    // Aktiver Auftrag oben, dann nach lastTs (DE-Format ist sortierbar via String)
    orderList.sort((a,b)=>{
        if(a.id===S.id) return -1;
        if(b.id===S.id) return 1;
        return (b.lastTs||'').localeCompare(a.lastTs||'');
    });
    return `<div class="sbo-left ${S.sbLeftOpen?'show':''}" onclick="S.sbLeftOpen=false;render()"></div>

// STAGE 0 — ERFASSUNG
// ═══════════════════════════════════════════════════════
function rS0(){
    return sw('Auftragserfassung','Verkauf',
        sub0()+
        (S.sub>=1?sub1():subL(1,'Zahlungsart'))+
        (S.sub>=2?sub2():subL(2,'Versandart'))+
        (S.sub>=3?sub3():subL(3,'Artikeldetails'))+
        (S.sub>=4?sub4():subL(4,'Besondere Merkmale'))+
        (S.sub>=5?sub5():subL(5,'Termin & Zusatz'))
    )}

function subL(i,l){return `<div class="block locked"><div class="bh"><div class="n np">${i+1}</div><div class="t">${l}</div></div></div>`}
function subD(i,l,s,b){
    const o=S.sub===i;
    return `<div class="block ${o?'active':'done'}">
        <div class="bh" ${o?'':`onclick="editSub(${i})" style="cursor:pointer"`}>
            <div class="n ${o?'na':'nd'}">${o?i+1:'✓'}</div><div class="t">${l}</div>
            ${!o?`<div class="s">${s}</div>`:''}
        </div>${o?`<div class="bb">${b}<div style="margin-top:12px;text-align:right"><button onclick="confirmSub(${i})" class="btn btn-p" ${subOk(i)?'':'disabled'}>Bestätigen</button></div></div>`:''}</div>`}
function subA(i,l,b){
    return `<div class="block active"><div class="bh"><div class="n na">${i+1}</div><div class="t">${l}</div></div>
        <div class="bb">${b}<div style="margin-top:14px;text-align:right"><button onclick="confirmSub(${i})" class="btn btn-p" ${subOk(i)?'':'disabled'}>Bestätigen</button></div></div></div>`}

// 0: AU + Kunde
function sub0(){
    const l='Auftrag & Kunde',s=S.au+' · '+S.kunde;
    const b=`<div class="rw r2">
        <div class="f"><label>Auftragsnummer(n) *</label><input id="i0" value="${esc(S.au)}" oninput="S.au=this.value;S.isKombi=this.value.includes(',')||this.value.includes('+');sfR()" placeholder="AU2026020513372"><div class="h">Mehrere mit Komma trennen → automatisch KOMBI-AUFTRAG</div></div>
        <div class="f"><label>Kunde / Firma *</label><input id="i0b" value="${esc(S.kunde)}" oninput="S.kunde=this.value;sfR()" placeholder="Ovit Shop V.O.F."></div>
    </div>`;
    return S.sub>0?subD(0,l,s,b):subA(0,l,b)}

// 1: Zahlungsart
function sub1(){
    const l='Zahlungsart',s=S.za?z().l+' (Prio '+z().p+')':'';
    let b=`<p style="font-size:12px;color:var(--txd);margin-bottom:10px">Bestimmt Priorität, Rechnungszeitpunkt und Kommi-Regel.</p>
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px">
        ${Object.entries(ZA).map(([k,v])=>`<div class="opt ${S.za===k?'sel':''}" onclick="S.za='${k}';render()"><div class="ico">${v.icon}</div><div class="ol">${v.l}</div><div style="margin-top:4px"><span class="tag ${v.p===1?'t-p1':'t-p2'}">PRIO ${v.p}</span></div></div>`).join('')}
        </div>`;
    if(S.za){
        b+=`<div class="al ai" style="margin-top:12px"><div class="i">ℹ</div><div>
            <strong style="color:var(--txb)">${z().l}</strong><br>
            <span style="color:var(--tx)">Rechnung:</span> ${z().re}<br>
            <span style="color:var(--tx)">Kommissionierung:</span> ${z().ko}
        </div></div>`;
        if(isFix()){
            b+=`<div style="margin-top:12px">
                ${rDatePicker('fixDatum', 'Gewünschter Liefertermin (Fixdatum) *', true, 'Wird in der Kommissionierungsplanung auf Machbarkeit geprüft')}
            </div>`;
            if(S.fixDatum) {
                // Grobe Vorab-Info zur Orientierung
                const fixDate = new Date(S.fixDatum);
                const heute = new Date();
                heute.setHours(0,0,0,0);
                let arbeitstage = 0;
                let checkDate = new Date(heute);
                while(checkDate < fixDate) {
                    checkDate.setDate(checkDate.getDate() + 1);
                    const day = checkDate.getDay();
                    if(day !== 0 && day !== 6) arbeitstage++;
                }
                const isMachbar = arbeitstage >= 3;
                b+=`<div class="al ${isMachbar ? 'ai' : 'aw'}" style="margin-top:8px">
                    <div class="i">${isMachbar ? '💡' : '⚠'}</div>
                    <div style="font-size:11px">
                        <strong>${arbeitstage} Arbeitstage</strong> bis zum Wunschtermin.<br>
                        ${isMachbar 
                            ? 'Sieht machbar aus — wird in der Kommissionierungsplanung final geprüft.' 
                            : 'Knapp! Machbarkeit muss in der Kommissionierungsplanung geprüft werden.'}
                    </div>
                </div>`;
            }
        }
    }
    return S.sub>1?subD(1,l,s+(isFix()&&S.fixDatum?' · Fix: '+fmtD(S.fixDatum):''),b):S.sub===1?subA(1,l,b):''}

// 2: Versandart
function sub2(){
    const l='Versandart',s=S.va?(VS[S.va].l+(isSp()&&S.frachtkosten?' · '+S.frachtkosten:'')):'';
    let b=`<p style="font-size:12px;color:var(--txd);margin-bottom:10px">Bestimmt ob Frachtkosten nötig und den weiteren Ablauf.</p>
        <div class="rw r2">${Object.entries(VS).map(([k,v])=>`<div class="opt ${S.va===k?'sel':''}" onclick="S.va='${k}';render()"><div class="ico">${v.icon}</div><div class="ol">${v.l}</div><div class="od">${v.d}</div></div>`).join('')}</div>`;
    if(S.va&&isSp()){
        b+=`<div class="al aw" style="margin-top:12px"><div class="i">⚠</div><div><strong>Frachtkosten berechnen!</strong> Bitte Frachtkosten im Frachtkostenrechner ermitteln und hier eintragen.</div></div>
        <div class="f ${!S.frachtkosten.trim()?'err':''}" style="margin-top:12px">
            <label>Errechnete Frachtkosten (netto) * (PFLICHT)</label>
            <input value="${esc(S.frachtkosten)}" oninput="S.frachtkosten=this.value" onblur="render()" placeholder="z.B. 245,00 €" class="mono">
            <div class="h">${S.frachtkosten.trim()?'✓ Frachtkosten eingetragen':'⚠ Pflichtfeld — Frachtkosten aus Frachtkostenrechner eintragen'}</div>
        </div>`;
    }
    if(S.va&&isAbh())b+=`<div class="al ao" style="margin-top:12px"><div class="i">✓</div><div>Abholung — keine Frachtkosten. Versandplanung wird übersprungen.</div></div>`;
    return S.sub>2?subD(2,l,s,b):S.sub===2?subA(2,l,b):''}

// 3: Artikel
function sub3(){
    const l='Artikeldetails',s=S.artAnz+' Stk'+(S.pal?' · '+S.pal+' Pal':'')+(S.ldm?' · '+S.ldm+' ldm':'');
    const b=`<div class="rw r3">
        <div class="f"><label>Anzahl Artikel *</label><input id="i3" value="${esc(S.artAnz)}" oninput="S.artAnz=this.value;sfR()" placeholder="177"></div>
        <div class="f"><label>Paletten</label><input id="i3b" value="${esc(S.pal)}" oninput="S.pal=this.value" placeholder="FTL / 7 Pal"></div>
        <div class="f"><label>Lademeter</label><input id="i3c" value="${esc(S.ldm)}" oninput="S.ldm=this.value" placeholder="18,4 ldm"></div>
    </div><div class="f"><label>Artikelbeschreibung</label><input id="i3d" value="${esc(S.artBeschr)}" oninput="S.artBeschr=this.value" placeholder="z.B. 6 Mix Paletten - 20 Staubsauger"></div>`;
    return S.sub>3?subD(3,l,s,b):S.sub===3?subA(3,l,b):''}

// 4: Merkmale
function sub4(){
    const l='Besondere Merkmale';
    const pts=[];if(isZoll())pts.push('Zoll ('+S.zielland+')');if(S.isLoose)pts.push('Loose');if(S.isKlein)pts.push('Kleinger.');if(S.isSonder)pts.push('Sonderfall');if(S.isSonderverein)pts.push('Sondervereinbarung');
    const s=pts.length?pts.join(' · '):'Keine';
    let b=`<p style="font-size:12px;color:var(--txd);margin-bottom:12px">Nur auswählen was zutrifft. Jedes Merkmal beeinflusst den Prozess.</p>`;

    // ZOLL — nur sichtbar wenn Zahlungsart "Zoll/Export" gewählt
    if(S.za==='zoll'){
    b+=`<div class="ck on" style="flex-direction:column;align-items:stretch;cursor:default">
        <div style="display:flex;align-items:center;gap:10px">
            <input type="checkbox" checked disabled>
            <span class="tag t-zoll">Zolldokument</span>
            <span style="font-size:10px;color:var(--grn);margin-left:auto">✓ Auto — Zahlungsart Zoll/Export</span>
        </div>
        <div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--bd)" onclick="event.stopPropagation()">
            <div class="al ad" style="margin-bottom:10px"><div class="i">🌍</div><div><strong>Rechnung erst NACH LKW-Beladung</strong> — korrigierte Mengen. Zollpapiere auf Basis finaler Rechnung.</div></div>
            <div class="f ${!S.zielland?'err':''}"><label>Zielland *</label>
                <select onchange="S.zielland=this.value;render()"><option value="">— Wählen —</option>${ZOLL_LAENDER.map(c=>`<option ${S.zielland===c?'selected':''}>${c}</option>`).join('')}</select>
                ${!S.zielland?'<div class="h">Pflichtfeld bei Zoll-Auftrag</div>':''}
            </div>
        </div>
    </div>`;
    }

    // LOOSE
    b+=`<div class="ck ${S.isLoose?'on':''}" style="flex-direction:column;align-items:stretch" onclick="S.isLoose=!S.isLoose;if(!S.isLoose)S.looseInfo='';render()">
        <div style="display:flex;align-items:center;gap:10px">
            <input type="checkbox" ${S.isLoose?'checked':''} onclick="event.stopPropagation()">
            <span class="tag t-loose">Loose Beladung</span>
            <span style="font-size:11px;color:var(--txd);margin-left:auto">Ohne Palette direkt in LKW</span>
        </div>
        ${S.isLoose?`<div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--bd)" onclick="event.stopPropagation()">
            <div class="al aw" style="margin-bottom:10px"><div class="i">📦</div><div><strong>Lademeter statt Palettenplätze</strong> — Beladung dauert länger, LKW-Kapazität separat prüfen.</div></div>
            <div class="f"><label>Beladungshinweis</label><input id="iLoose" value="${esc(S.looseInfo)}" oninput="S.looseInfo=this.value" placeholder="z.B. Kühlschränke stehend verladen"></div>
        </div>`:''}
    </div>`;

    // KLEIN
    b+=`<div class="ck ${S.isKlein?'on':''}" onclick="S.isKlein=!S.isKlein;render()">
        <input type="checkbox" ${S.isKlein?'checked':''} onclick="event.stopPropagation()">
        <span class="tag t-klein">Kleingeräte</span>
        <span style="font-size:11px;color:var(--txd);margin-left:auto">Staubsauger, Mikrowellen — gemischte Paletten</span>
    </div>`;

    // SONDER
    b+=`<div class="ck ${S.isSonder?'on':''}" style="flex-direction:column;align-items:stretch" onclick="S.isSonder=!S.isSonder;if(!S.isSonder)S.sonderText='';render()">
        <div style="display:flex;align-items:center;gap:10px">
            <input type="checkbox" ${S.isSonder?'checked':''} onclick="event.stopPropagation()">
            <span class="tag t-sonder">SONDERFALL</span>
            <span style="font-size:11px;color:var(--txd);margin-left:auto">Abweichender Ablauf</span>
        </div>
        ${S.isSonder?`<div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--bd)" onclick="event.stopPropagation()">
            <div class="f ${!S.sonderText.trim()?'err':''}" onclick="event.stopPropagation()"><label>Was ist der Sonderfall? *</label>
                <textarea id="iSond" onclick="event.stopPropagation()" oninput="S.sonderText=this.value;sfR()" placeholder="Pflichtfeld — Was weicht ab und warum? Erscheint im Ticket.">${esc(S.sonderText)}</textarea>
                ${!S.sonderText.trim()?'<div class="h">Ohne Erklärung kann nicht bestätigt werden</div>':''}
            </div>
        </div>`:''}
    </div>`;

    // SONDERVEREINBARUNG (Customer-facing Legal-Klausel — kommt vorne in JTL-Text)
    b+=`<div class="ck ${S.isSonderverein?'on':''}" onclick="S.isSonderverein=!S.isSonderverein;render()">
        <input type="checkbox" ${S.isSonderverein?'checked':''} onclick="event.stopPropagation()">
        <span class="tag t-kombi">SONDERVEREINBARUNG</span>
        <span style="font-size:11px;color:var(--txd);margin-left:auto">Verkäufer ↔ Kunde haben für diesen Auftrag etwas Spezielles vereinbart</span>
    </div>`;

    // PRIVATKUNDE (Planner-Label — relevant für Rechnungs-/Lieferungs-Pfad)
    b+=`<div class="ck ${S.isPrivat?'on':''}" onclick="S.isPrivat=!S.isPrivat;render()">
        <input type="checkbox" ${S.isPrivat?'checked':''} onclick="event.stopPropagation()">
        <span class="tag t-privat">Privatkunde</span>
        <span style="font-size:11px;color:var(--txd);margin-left:auto">B2C statt B2B — abweichende Rechnungs-Logik</span>
    </div>`;

    // UIT-CODE (Planner-Label — Zoll/Tracking-Identifier)
    b+=`<div class="ck ${S.hasUit?'on':''}" onclick="S.hasUit=!S.hasUit;render()">
        <input type="checkbox" ${S.hasUit?'checked':''} onclick="event.stopPropagation()">
        <span class="tag t-uit">UIT-Code</span>
        <span style="font-size:11px;color:var(--txd);margin-left:auto">UIT-Code erforderlich (Sendungs-Tracking / Zoll)</span>
    </div>`;

    // STORNIERT (Planner-Label — Auftrag wurde storniert)
    b+=`<div class="ck ${S.isStorno?'on':''}" onclick="S.isStorno=!S.isStorno;render()">
        <input type="checkbox" ${S.isStorno?'checked':''} onclick="event.stopPropagation()">
        <span class="tag t-storno">STORNIERT</span>
        <span style="font-size:11px;color:var(--txd);margin-left:auto">Auftrag storniert — keine Bearbeitung mehr</span>
    </div>`;

    return S.sub>4?subD(4,l,s,b):S.sub===4?subA(4,l,b):''}

// 5: Termin + Zusatz
function sub5(){
    const isPrio2 = S.za==='vorkasse'||S.za==='barzahler';
    const l='Termin & Zusatz',s=(S.tpKommiDatum?'Kommi: '+fmtD(S.tpKommiDatum):'')+(S.termin?' · '+S.termin:'');
    let b=``;
    
    if(isPrio2){
        b+=`<div class="al ai" style="margin-bottom:12px"><div class="i">ℹ</div><div style="font-size:11px"><strong>Prio 2 (${S.za==='vorkasse'?'Vorkasse':'Barzahler'}):</strong> Kommissionierungsdatum optional — Auftrag kann sich in der Planung verschieben.</div></div>`;
        b+=rDatePicker('tpKommiDatum', 'Kommissionierungsdatum (optional)', false, 'Kann später bei Kapazität eingeplant werden');
    } else {
        b+=rDatePicker('tpKommiDatum', 'Kommissionierungsdatum (PFLICHT)', true, '⚠ Bei Dustin/Kommissionierungsplanung erfragen');
    }
    
    // FIXTERMIN: Prüfung ob genug Puffer zwischen Kommi und Liefertermin
    if(isFix() && S.fixDatum && S.tpKommiDatum) {
        const fixDate = new Date(S.fixDatum);
        const kommiDate = new Date(S.tpKommiDatum);
        const diffMs = fixDate - kommiDate;
        const diffTage = Math.round(diffMs / (1000 * 60 * 60 * 24));
        
        if(diffTage < 2) {
            b+=`<div class="al ae" style="margin-top:12px;border:2px solid var(--red)">
                <div class="i">🚫</div>
                <div>
                    <strong style="color:var(--red)">STOPP: Zu wenig Puffer!</strong><br>
                    <span style="font-size:11px">Zwischen Kommissionierung (${fmtD(S.tpKommiDatum)}) und Fixtermin (${fmtD(S.fixDatum)}) ${diffTage < 1 ? 'ist kein Tag' : 'ist nur ' + diffTage + ' Tag'} Puffer.<br>
                    <strong>Mindestens 2 Tage</strong> werden benötigt (Versand + Puffer).</span>
                </div>
            </div>
            <div class="al ai" style="margin-top:8px">
                <div class="i">💡</div>
                <div style="font-size:11px">
                    <strong>Lösung:</strong> Entweder früheres Kommissionierungsdatum wählen oder mit dem Kunden einen späteren Fixtermin vereinbaren.
                </div>
            </div>
            
            <div style="margin-top:12px;border:1px solid var(--orange);border-radius:8px;overflow:hidden">
                <div style="background:rgba(210,153,34,0.15);padding:10px 12px;display:flex;align-items:center;gap:8px">
                    <span>⚠️</span>
                    <span style="font-size:11px;font-weight:600;color:var(--orange)">Abweichender Prozess (nur mit Freigabe)</span>
                </div>
                <div style="padding:12px;background:var(--sf2)">
                    <div class="ck ${S.fixOverride?'on':''}" style="margin-bottom:10px">
                        <input type="checkbox" ${S.fixOverride?'checked':''} onchange="S.fixOverride=this.checked;if(!this.checked)S.fixOverrideVon='';render()">
                        <span style="font-size:11px;${S.fixOverride?'color:var(--orange)':''}">Trotz zu knappem Puffer fortfahren</span>
                    </div>
                    ${S.fixOverride?`
                    <div class="f" style="margin-bottom:0">
                        <label style="color:var(--orange)">Freigegeben durch *</label>
                        <select onchange="S.fixOverrideVon=this.value;render()" style="border-color:var(--orange)">
                            <option value="">— Vorgesetzten auswählen —</option>
                            <option ${S.fixOverrideVon==='Dustin'?'selected':''}>Dustin</option>
                            <option ${S.fixOverrideVon==='Geschäftsführung'?'selected':''}>Geschäftsführung</option>
                        </select>
                        <div class="h" style="color:var(--orange)">Verantwortung für Risiko wird dokumentiert</div>
                    </div>
                    `:''}
                </div>
            </div>`;
        } else {
            // Override zurücksetzen wenn Puffer jetzt OK
            if(S.fixOverride) { S.fixOverride = false; S.fixOverrideVon = ''; }
            b+=`<div class="al ao" style="margin-top:12px">
                <div class="i">✓</div>
                <div style="font-size:11px">
                    <strong>${diffTage} Tage Puffer</strong> zwischen Kommi (${fmtD(S.tpKommiDatum)}) und Fixtermin (${fmtD(S.fixDatum)}) — OK!
                </div>
            </div>`;
        }
    }
    
    b+=`<div class="rw r2">
        <div class="f"><label>Terminwünsche (optional)</label><input id="i5a" value="${esc(S.termin)}" oninput="S.termin=this.value" placeholder="${isFix()?'Fixtermin bereits erfasst':'z.B. flexibel / KW9'}"></div>
        <div class="f"><label>Besondere Vereinbarungen</label><input id="i5b" value="${esc(S.besonderes)}" oninput="S.besonderes=this.value" placeholder="z.B. Zusammen mit AU... verladen"></div>
    </div>
    <div class="ck ${S.jltOk?'on':''}"><input type="checkbox" ${S.jltOk?'checked':''} onchange="S.jltOk=this.checked;render()">
        <span style="font-size:12px;${S.jltOk?'color:var(--grn)':''}">${isSp()?'Lieferadresse in JTL geprüft / hinterlegt':'Kontaktdaten & Abholbedingungen geprüft (Rampe, Öffnungszeiten, Ansprechpartner)'}</span>
    </div>`;
    return S.sub>5?subD(5,l,s,b):S.sub===5?subA(5,l,b):''}

// STAGE 1 — RECHNUNG
// ═══════════════════════════════════════════════════════
function rS1(){
    let b='';
    // Fracht
    if(isSp()){
        b+=`<div style="background:var(--bg);border:1px solid var(--bdd);border-radius:8px;padding:12px;margin-bottom:12px">
            <div style="display:flex;justify-content:space-between;align-items:center">
                <div>
                    <div style="font-size:10px;color:var(--grn);text-transform:uppercase;font-weight:600">✓ Frachtkosten (aus Auftragserfassung)</div>

        <div class="ck ${S.frachtOk?'on':''}" style="margin-bottom:16px"><input type="checkbox" ${S.frachtOk?'checked':''} onchange="S.frachtOk=this.checked;if(this.checked)lg('Frachtkosten',S.frachtkosten+' im AU ergänzt');render()">
