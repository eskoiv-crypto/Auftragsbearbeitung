        b+=`<div class="al ao"><div class="i">✓</div><div>Abholung — keine Frachtkosten</div></div>`;
    }
    b+=`<div class="dv"></div>`;

    if(isZoll()){
        b+=`<div class="al aw"><div class="i">🌍</div><div><strong>Zoll-Auftrag:</strong> Rechnung wird NICHT jetzt erstellt — erst nach LKW-Beladung mit korrigierten Mengen.${isSp()?' Frachtkosten trotzdem jetzt im AU hinterlegen.':''}</div></div>
        <div class="al ai"><div class="i">ℹ</div><div>Zoll-Ablauf: 1) LKW beladen → 2) Rechnung erstellen → 3) Zollpapiere → 4) Abfahrt. Rechnung und Zollpapiere werden separat nach der Beladung erstellt.</div></div>`;
    } else {
        b+=`<div class="al ai"><div class="i">📄</div><div><strong>Rechnungsregel:</strong> ${z().re}</div></div>`;

        // Zahlungsziel / Fixtermin: Zeitpunkt wählen
        if(S.za==='zahlungsziel'||isFix()){
            b+=`<p style="font-size:12px;color:var(--txd);margin-bottom:10px">Rechnungszeitpunkt:</p>
            <div class="rw r2" style="margin-bottom:14px">
                <div class="opt ${S.reZeit==='bereit'?'sel':''}" onclick="S.reZeit='bereit';render()"><div class="ol">Bei Versandbereitschaft</div><div class="od">Standard — Tag der Kommi</div></div>
                <div class="opt ${S.reZeit==='sofort'?'sel':''}" onclick="S.reZeit='sofort';render()"><div class="ol">Sofort</div><div class="od" style="color:var(--amb)">⚠ ZZ verlängern!</div></div>
            </div>`;
            if(S.reZeit==='sofort'){
                b+=`<div class="ck ${S.zzOk?'on':''}" style="margin-bottom:14px"><input type="checkbox" ${S.zzOk?'checked':''} onchange="S.zzOk=this.checked;render()">
                    <span style="font-size:12px;${S.zzOk?'color:var(--grn)':'color:var(--amb)'}">Zahlungsziel entsprechend verlängert</span>
                </div>`;
            }
        } else {
            // Vorkasse / Barzahler: SOFORT
            b+=`<div class="al ad"><div class="i">⚡</div><div><strong>Rechnung SOFORT erstellen!</strong> ${S.za==='vorkasse'?'7 Tage Zahlungsfrist.':isAbh()?'Zahlung bar bei Abholung.':'Zahlung bar bei Übergabe / Nachnahme.'}</div></div>`;
        }

        b+=`<div class="ck ${S.reOk?'on':''}"><input type="checkbox" ${S.reOk?'checked':''} onchange="S.reOk=this.checked;if(this.checked)lg('Rechnung','Erstellt und versendet');render()">
            <span style="font-size:12px;font-weight:600;${S.reOk?'color:var(--grn)':''}">Rechnung erstellt und an Kunden versendet</span>
        </div>`;
        if(S.reOk){
            b+=`<div class="f" style="margin-top:12px"><label>Rechnungsnummer</label>
                <input value="${esc(S.re)}" oninput="S.re=this.value" placeholder="RE202602069487" class="mono">
                <div class="h">Wird im Ticket dokumentiert</div>
            </div>`;
        }
    }
    // Add JTL Generator
    b += rJTLGenerator();

    // Wenn-Dann — JTL-Abgleich (3 Häkchen) Pflicht (Phase 4.2 Stellenbeschreibung)
    b += `<div class="dv"></div>
        <div style="background:var(--bg-secondary);border:1px solid var(--separator);border-radius:var(--r-card);padding:14px 18px;box-shadow:var(--shadow-1);margin-bottom:14px">
            <p style="font-size:13px;font-weight:600;color:var(--label);margin-bottom:4px">JTL-Abgleich (Phase 4.2)</p>
            <p style="font-size:11px;color:var(--label-3);margin-bottom:12px;line-height:1.4">Saleskärtchen ↔ JTL Position für Position prüfen. Bei Diskrepanz <strong>vor</strong> Rechnungsstellung klären — niemals einfach „eine Variante" wählen.</p>
            <div class="ck ${S.jtlAbgleich?.mengen?'on':''}" onclick="if(!S.jtlAbgleich)S.jtlAbgleich={mengen:false,versandart:false,zz:false};S.jtlAbgleich.mengen=!S.jtlAbgleich.mengen;if(S.jtlAbgleich.mengen)lg('JTL-Abgleich','Mengen ✓');render()">
                <input type="checkbox" ${S.jtlAbgleich?.mengen?'checked':''} onclick="event.stopPropagation()">
                <span>Mengen / Stückzahl stimmt mit Saleskärtchen überein</span>
            </div>
            <div class="ck ${S.jtlAbgleich?.versandart?'on':''}" onclick="if(!S.jtlAbgleich)S.jtlAbgleich={mengen:false,versandart:false,zz:false};S.jtlAbgleich.versandart=!S.jtlAbgleich.versandart;if(S.jtlAbgleich.versandart)lg('JTL-Abgleich','Versandart ✓');render()">
                <input type="checkbox" ${S.jtlAbgleich?.versandart?'checked':''} onclick="event.stopPropagation()">
                <span>Versandart (Abholung / Spedition) stimmt überein</span>
            </div>
            <div class="ck ${S.jtlAbgleich?.zz?'on':''}" onclick="if(!S.jtlAbgleich)S.jtlAbgleich={mengen:false,versandart:false,zz:false};S.jtlAbgleich.zz=!S.jtlAbgleich.zz;if(S.jtlAbgleich.zz)lg('JTL-Abgleich','Zahlungsziel ✓');render()" style="margin-bottom:0">
                <input type="checkbox" ${S.jtlAbgleich?.zz?'checked':''} onclick="event.stopPropagation()">
                <span>Zahlungsziel (Vorkasse / ZZ X Tage / Barzahler) stimmt überein</span>
            </div>
        </div>`;

    // Wenn-Dann — Rechnungs-PDF in Teamskärtchen angehängt (Phase 4.5)
    b += `<div style="background:var(--bg-secondary);border:1px solid var(--separator);border-radius:var(--r-card);padding:14px 18px;box-shadow:var(--shadow-1);margin-bottom:14px">
            <p style="font-size:13px;font-weight:600;color:var(--label);margin-bottom:4px">Rechnungs-PDF im Teamskärtchen (Phase 4.5)</p>
            <p style="font-size:11px;color:var(--label-3);margin-bottom:12px;line-height:1.4">Rechnung aus Outlook (PDF) herunterladen → in das zugehörige Teamskärtchen als Anhang einfügen. Eine versendete Rechnung ohne Anhang gilt als <strong>nicht abgelegt</strong>.</p>
            ${S.rePdfAttached
                ? `<div class="al ao" style="margin-bottom:0"><div class="i">✓</div><div><strong>PDF angehängt</strong> · ${esc(S.rePdfAttachedAt||'')} <button onclick="S.rePdfAttached=false;S.rePdfAttachedAt='';lg('PDF-Anhang','zurückgesetzt');render()" class="btn btn-o" style="font-size:10px;padding:3px 8px;margin-left:8px">Zurücksetzen</button></div></div>`
                : `<button onclick="S.rePdfAttached=true;S.rePdfAttachedAt=new Date().toLocaleString('de-DE');lg('PDF-Anhang','Rechnungs-PDF im Teamskärtchen bestätigt');render()" class="btn btn-p" style="width:100%">📎 Rechnungs-PDF angehängt — bestätigen</button>`
            }
        </div>`;

    // Add Terminrechner for customer communication - nur bei Lieferung und NICHT bei Fixtermin
    // (Bei Abholung holt Kunde selbst, bei Fixtermin ist Datum bereits vorgegeben)
    if(isSp() && !isFix()) {
        b += rTerminrechner();
    }
    return sw('Rechnungsstellung','Janna',b)}

// ═══════════════════════════════════════════════════════
// STAGE 2 — KOMMI
// ═══════════════════════════════════════════════════════
function rS2(){
    let b=`<div class="al ai"><div class="i">📋</div><div><strong>Kommi-Regel:</strong> ${z().ko}</div></div>`;
    if(S.termin)b+=`<div class="al aw"><div class="i">📅</div><div>Terminwunsch: <strong>${esc(S.termin)}</strong></div></div>`;
    
    // Kommi-Datum aus Stage 0 übernehmen wenn vorhanden
    if(S.tpKommiDatum && !S.kDat) {
        S.kDat = S.tpKommiDatum;
    }
    
    // FIXTERMIN: Machbarkeitsprüfung
    if(isFix()&&S.fixDatum){
        const fixDate = new Date(S.fixDatum);
        const heute = new Date();
        heute.setHours(0,0,0,0);
        
        // Berechne Arbeitstage
        let arbeitstage = 0;
        let checkDate = new Date(heute);
        while(checkDate < fixDate) {
            checkDate.setDate(checkDate.getDate() + 1);
            const day = checkDate.getDay();
            if(day !== 0 && day !== 6) arbeitstage++;
        }
        
        // Berechne spätestes Kommidatum
        let kommiDate = new Date(fixDate);
        let kommiVorlauf = 2;
        while(kommiVorlauf > 0) {
            kommiDate.setDate(kommiDate.getDate() - 1);
            const day = kommiDate.getDay();
            if(day !== 0 && day !== 6) kommiVorlauf--;
        }
        const kommiFormatted = kommiDate.toLocaleDateString('de-DE', {weekday:'short', day:'2-digit', month:'2-digit'});
        const fixFormatted = fmtD(S.fixDatum);
        const kritisch = arbeitstage < 3;
        
        b+=`<div style="margin:14px 0;border:1px solid ${kritisch ? 'var(--orange)' : 'var(--blue)'};border-radius:10px;overflow:hidden">
            <div style="background:${kritisch ? 'rgba(210,153,34,0.15)' : 'rgba(88,166,255,0.1)'};padding:12px 16px;display:flex;align-items:center;gap:10px">
                <span style="font-size:16px">${kritisch ? '⚠️' : '📅'}</span>
                <div>
                    <strong style="color:${kritisch ? 'var(--orange)' : 'var(--blue)'}">Fixtermin: ${fixFormatted}</strong>
                    <div style="font-size:11px;color:var(--txd)">${arbeitstage} Arbeitstage verfügbar — Späteste Kommi: ${kommiFormatted}</div>
                </div>
            </div>
            <div style="padding:14px 16px;background:var(--sf2)">
                <p style="font-size:11px;color:var(--txd);margin-bottom:12px">Bitte prüfen Sie anhand der Kommissionierungs-Pipeline, ob der Fixtermin eingehalten werden kann:</p>
                
                <div class="ck ${S.fixPruefung==='machbar'?'on':''}" style="margin-bottom:8px;padding:10px;background:var(--bg);border-radius:6px;border:1px solid ${S.fixPruefung==='machbar'?'var(--green)':'var(--bd)'}">
                    <input type="radio" name="fixPruefung" ${S.fixPruefung==='machbar'?'checked':''} onchange="S.fixPruefung='machbar';S.fixAlternworfen='';lg('Fixtermin','Machbar — '+fmtD(S.fixDatum));render()">
                    <span style="color:${S.fixPruefung==='machbar'?'var(--green)':'var(--txb)'}">✓ Kommissionierungsplanung geprüft — <strong>Fixtermin ist machbar</strong></span>
                </div>
                
                <div class="ck ${S.fixPruefung==='nicht_machbar'?'on':''}" style="padding:10px;background:var(--bg);border-radius:6px;border:1px solid ${S.fixPruefung==='nicht_machbar'?'var(--orange)':'var(--bd)'}">
                    <input type="radio" name="fixPruefung" ${S.fixPruefung==='nicht_machbar'?'checked':''} onchange="S.fixPruefung='nicht_machbar';render()">
                    <span style="color:${S.fixPruefung==='nicht_machbar'?'var(--orange)':'var(--txb)'}">✗ Fixtermin <strong>NICHT machbar</strong> — Alternative nötig</span>
                </div>
                
                ${S.fixPruefung==='nicht_machbar'?`
                <div style="margin-top:12px;padding:12px;background:rgba(210,153,34,0.1);border:1px solid var(--orange);border-radius:6px">
                    <div class="f" style="margin-bottom:0">
                        <label style="color:var(--orange)">Alternativer Liefertermin *</label>
                        <input type="date" value="${S.fixAlternworfen}" onchange="S.fixAlternworfen=this.value;if(this.value)lg('Fixtermin','Nicht machbar — Alternative: '+fmtD(this.value));render()" style="font-family:'JetBrains Mono',monospace">
                        <div class="h">Diesen Termin dem Kunden als Alternative vorschlagen</div>
                    </div>
                </div>
                `:''}
            </div>
        </div>`;
    }
    
    // Kommi-Datum: Wenn bereits in Stage 0 erfasst, nur anzeigen - sonst eingeben lassen
    if(S.tpKommiDatum) {
        b+=`<div style="background:var(--bg);border:1px solid var(--bdd);border-radius:8px;padding:12px;margin-bottom:14px">
            <div style="display:flex;justify-content:space-between;align-items:center">
                <div>
                    <div style="font-size:10px;color:var(--grn);text-transform:uppercase;font-weight:600">✓ Kommissionierungsdatum (aus Auftragserfassung)</div>
                    <div style="font-size:16px;font-weight:700;color:var(--txb);margin-top:4px">${fmtD(S.kDat)}</div>
                </div>
                <button onclick="S.tpKommiDatum='';S.kDat='';render()" class="btn btn-o" style="font-size:10px;padding:4px 8px">✎ Ändern</button>
            </div>
        </div>
        <div class="f" style="margin-bottom:14px"><label>Zugewiesen an</label><select onchange="S.kWer=this.value;render()"><option value="">—</option>${TM.map(t=>`<option ${S.kWer===t?'selected':''}>${t}</option>`).join('')}</select></div>`;
    } else {
        b+=`<div class="rw r2" style="margin-bottom:14px">
            ${rDatePicker('kDat', 'Kommissionierungsdatum', true, 'Wann soll kommissioniert werden?', 'Kommi geplant')}
            <div class="f"><label>Zugewiesen an</label><select onchange="S.kWer=this.value;render()"><option value="">—</option>${TM.map(t=>`<option ${S.kWer===t?'selected':''}>${t}</option>`).join('')}</select></div>
        </div>`;
    }
    
    // Fixtermin: Warnung wenn zu nah
    if(isFix()&&S.fixDatum&&S.kDat){
        const diff=Math.round((new Date(S.fixDatum)-new Date(S.kDat))/(86400000));
        if(diff<2)b+=`<div class="al ad"><div class="i">⚠</div><div><strong>Zu nah am Fixtermin!</strong> Nur ${diff} Tag(e) Puffer — mind. 2 Tage empfohlen.</div></div>`;
        else b+=`<div class="al ao"><div class="i">✓</div><div>${diff} Tage bis Fixtermin — ausreichend Puffer.</div></div>`;
    }
    b+=`<div class="ck ${S.kapOk?'on':''}"><input type="checkbox" ${S.kapOk?'checked':''} onchange="S.kapOk=this.checked;if(this.checked)lg('Kapazität','Geprüft — '+S.artAnz+' Artikel');render()">
        <span style="font-size:12px;${S.kapOk?'color:var(--grn)':''}">Tageskapazität geprüft — ${S.artAnz} Artikel bei ca. 300 Geräte/Tag</span>
    </div>`;
    return sw('Kommissionierungsplanung','Dustin',b)}

// STAGE 3 — VERSAND (nur Lieferung)
// ═══════════════════════════════════════════════════════
function rS3(){
    let b='';

    // Wenn-Dann — Warenwert-Pflichtfeld (für AMM/Zoll-Anmeldung)
    if(isSp() || isZoll()){
        b+=`<div class="f"><label>Warenwert *</label>
            <input value="${esc(S.warenwert)}" oninput="S.warenwert=this.value" placeholder="z. B. 12.450,00 € (für Versicherung + Zoll)" inputmode="decimal">
            <div class="h">${isZoll()?'Pflicht für Zoll-Anmeldung':'Pflicht für AMM-Anmeldung (Versicherung)'}</div>
        </div>`;
    }

    // Vorkasse: Ticket wird mit Status "Warten auf Zahlung" erstellt
    if(needsPayBefore()){
        b+=`<div class="al aw" style="margin-bottom:14px"><div class="i">⏳</div><div><strong>Vorkasse:</strong> Ticket wird erstellt mit Status "Warten auf Zahlung".<br><span style="font-size:11px">Versand erfolgt erst nach Zahlungseingang. 7 Tage Zahlungsfrist — danach Storno.</span></div></div>`;
        
        b+=`<div class="al ao"><div class="i">✓</div><div>
            <strong>Ticket kann jetzt erstellt werden</strong><br>
            <span style="font-size:11px;color:var(--txd)">Im Ticket wird "⏳ Warten auf Zahlung" angezeigt. Bei Zahlungseingang → Versand bei AMM anmelden.</span>
        </div></div>`;
        
    } else {
        // Alle anderen Zahlungsarten: direkt AMM-Anmeldung
        if(isBar()){
            b+=`<div class="al ai" style="margin-bottom:14px"><div class="i">💵</div><div><strong>Barzahler:</strong> ${isAbh()?'Zahlung erfolgt bar bei Abholung vor Ort.':'Barzahlung bei Lieferung — Nachnahme/Zahlungsvereinbarung beachten.'}</div></div>`;
        } else {
            const typ=S.za==='zahlungsziel'||isFix()?'Zahlungsziel':isZoll()?'Zoll/Export':'';
            if(typ) b+=`<div class="al ao" style="margin-bottom:14px"><div class="i">✓</div><div>${typ} — keine Zahlungsprüfung vor Versand nötig.</div></div>`;
        }
        b+=`<div class="al ao" style="margin-bottom:14px"><div class="i">📦</div><div>Finaler Schritt: Bestätigen Sie die Anmeldung bei AMM / Lager für ${isAbh()?'die Abholung':'den Versand'}.</div></div>
        <div class="ck ${S.ammAngemeldet?'on':''}"><input type="checkbox" ${S.ammAngemeldet?'checked':''} onchange="S.ammAngemeldet=this.checked;if(this.checked)lg('AMM','${isAbh()?'Abholung':'Versand'} bei AMM angemeldet');render()">
            <span style="font-size:13px;font-weight:700;${S.ammAngemeldet?'color:var(--grn)':''}">Versand/Abholung bei AMM angemeldet</span>
        </div>`;
    }

    // Wenn-Dann — Bezahlt-Status (Phase 5/6 Pflicht)
    b+=`<div class="ck ${S.bezahlt?'on':''}" style="margin-top:10px" onclick="S.bezahlt=!S.bezahlt;if(S.bezahlt)lg('Bezahlt-Status','bestätigt');render()">
        <input type="checkbox" ${S.bezahlt?'checked':''} onclick="event.stopPropagation()">
        <span>Bezahlt-Status bestätigt</span>
    </div>`;

    // Wenn-Dann — End-of-Order-Checklist (Kapitel 6 + 6.6)
    b+=`<div class="dv"></div>
        <div style="background:var(--bg-secondary);border:1px solid var(--separator);border-radius:var(--r-card);padding:14px 18px;box-shadow:var(--shadow-1);margin-bottom:14px">
            <p style="font-size:13px;font-weight:600;color:var(--label);margin-bottom:4px">Vor Abschluss prüfen (Phase 6)</p>
            <p style="font-size:11px;color:var(--label-3);margin-bottom:12px;line-height:1.4">Pflicht-Häkchen vor Ticket-Erstellung. „Aufträge von A bis Z begleiten — keine Übergabe ohne sauberen Wissensstand."</p>
            <div class="ck ${S.endChecklist?.teams?'on':''}" onclick="if(!S.endChecklist)S.endChecklist={teams:false,pipeline:false,sharepoint:false};S.endChecklist.teams=!S.endChecklist.teams;if(S.endChecklist.teams)lg('End-Check','Teamskärtchen geschlossen');render()">
                <input type="checkbox" ${S.endChecklist?.teams?'checked':''} onclick="event.stopPropagation()">
                <span>Teamskärtchen im Planner geschlossen / auf „Beendet"</span>
            </div>
            <div class="ck ${S.endChecklist?.pipeline?'on':''}" onclick="if(!S.endChecklist)S.endChecklist={teams:false,pipeline:false,sharepoint:false};S.endChecklist.pipeline=!S.endChecklist.pipeline;if(S.endChecklist.pipeline)lg('End-Check','Pipeline auf erledigt');render()">
                <input type="checkbox" ${S.endChecklist?.pipeline?'checked':''} onclick="event.stopPropagation()">
                <span>Pipeline-Excel auf „erledigt" (Spalten N + Q)</span>
            </div>
            <div class="ck ${S.endChecklist?.sharepoint?'on':''}" onclick="if(!S.endChecklist)S.endChecklist={teams:false,pipeline:false,sharepoint:false};S.endChecklist.sharepoint=!S.endChecklist.sharepoint;if(S.endChecklist.sharepoint)lg('End-Check','SharePoint-Ablage komplett');render()" style="margin-bottom:0">
                <input type="checkbox" ${S.endChecklist?.sharepoint?'checked':''} onclick="event.stopPropagation()">
                <span>SharePoint-Ablage komplett (Rechnung, Lieferschein, Mailverkehr)</span>
            </div>
        </div>`;

    return sw('AMM Anmeldung','Dustin',b)}

        <div style="display:flex;gap:6px"><input id="cT" style="flex:1;font-size:11px;padding:7px 10px;background:var(--bg);border:1px solid var(--bd);color:var(--tx);border-radius:6px" placeholder="Kommentar..." onkeydown="if(event.key==='Enter')addC()"><button onclick="addC()" style="padding:6px 12px;background:var(--blue);color:#fff;border:none;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer">↵</button></div></div>

        <p style="font-size:10px;font-weight:600;color:var(--txd);text-transform:uppercase;margin-bottom:8px">Audit (${S.audit.length})</p>
        <div style="max-height:200px;overflow-y:auto">${S.audit.slice().reverse().map(e=>`<div class="ar"><span class="mono" style="color:var(--txd)">${e.ts}</span><span style="color:var(--txd)">${e.st}</span><span style="color:var(--tx)">${e.a}${e.d?' — '+e.d:''}</span></div>`).join('')}</div>

function rTick(){

    let payTxt='Zahlungsziel';
    if(needsPayBefore())payTxt='⏳ Warten auf Zahlung';

            ${tc('Fracht',isSp()?(S.frachtkosten||'—'):'—')} ${tc('Kommi',S.kDat?fmtD(S.kDat):'—')} ${tc('Lieferung',isSp()?formatLieferterminTicket():'—')} ${tc('Status',payTxt)}
        </div>

            ${isZoll()?`<div class="tk-section"><div class="l">🌍 ZOLL</div><p>Zielland: <strong>${S.zielland}</strong></p></div>`:''}
            ${S.isSonder?`<div class="tk-section" style="border-color:rgba(248,81,73,.3)"><div class="l" style="color:var(--red)">⚠ SONDERFALL</div><p>${esc(S.sonderText)}</p></div>`:''}
            ${S.besonderes?`<div class="tk-section"><div class="l">📋 VEREINBARUNGEN</div><p>${esc(S.besonderes)}</p></div>`:''}
            ${S.isLoose?`<div class="tk-section"><div class="l">📦 LOOSE</div><p>${esc(S.looseInfo)||'Direkte LKW-Beladung'}</p></div>`:''}

        ${S.komm.length?`<div class="tk-section"><div class="l">💬 KOMMENTARE (${S.komm.length})</div>${S.komm.map(c=>`<p><strong>${c.w}</strong> <span style="color:var(--txd);font-size:8px">${c.ts}</span>: ${esc(c.t)}</p>`).join('')}</div>`:''}
        
        <div class="tk-section">
            <div class="l" style="margin-bottom:4px">📝 PROTOKOLL (${S.audit.length})</div>
            <div class="audit-scroll" style="max-height:${S.audit.length>10?'100px':'none'};overflow-y:auto">
                ${S.audit.map(e=>`<div class="ar"><span class="mono">${e.ts}</span><span style="color:var(--txd)">${e.st}</span><span>${e.a}${e.d?' — '+e.d:''}</span></div>`).join('')}
            </div>

        <div style="text-align:center;margin-top:10px">
            ${needsPayBefore()?`
            <div style="display:inline-block;background:rgba(210,153,34,.1);border:1px solid rgba(210,153,34,.4);border-radius:6px;padding:8px 24px">
                <p style="font-size:11px;font-weight:700;color:var(--amb)">⏳ Warten auf Zahlungseingang — dann Versand bei AMM anmelden</p>

            </div>

function tc(l,v,m=0){return `<div class="tc"><div class="l">${l}</div><div class="v ${m?'mono':''}">${v||'—'}</div></div>`}

function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function fmtD(d){if(!d)return '—';try{return new Date(d).toLocaleDateString('de-DE')}catch(e){return d}}

function sfR(){
    clearTimeout(sfR._t);
    sfR._t=setTimeout(()=>{const a=document.activeElement,id=a?.id,ss=a?.selectionStart,se=a?.selectionEnd;render();if(id){const el=document.getElementById(id);if(el){el.focus();if(typeof ss==='number'&&el.setSelectionRange)try{el.setSelectionRange(ss,se)}catch(e){}}}},200);
}

function addC(){
    const t=document.getElementById('cT'),a=document.getElementById('cA');
    if(!t||!t.value.trim())return;
    S.komm.push({w:a?.value||'System',t:t.value.trim(),ts:new Date().toLocaleString('de-DE',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'})});
    lg('Kommentar',(a?.value||'System')+': '+t.value.trim().slice(0,40));
    t.value='';render();
}

function storno(){
    if(!confirm('Storno einleiten? Auftrag stornieren und Ware rücklagern.'))return;
    lg('STORNO','Keine Zahlung — Storno + Rücklagern');
    alert('⚠ Storno eingeleitet!\n\n1. Auftrag in JTL stornieren\n2. Lager informieren — Ware rücklagern\n3. JTL-Bestand aktualisieren\n4. Kunden informieren');
    render();
}

function downloadPDF(){
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF('p', 'mm', 'a4');
    
    // A4 = 210 x 297 mm
    const pw = 210, ph = 297;
    const ml = 15, mr = 15, mt = 15;
    const cw = pw - ml - mr;
    let y = mt;
    
    // Daten
    const x = z();
    const reNr = isZoll() ? S.reZoll : S.re;
    let payTxt = 'Zahlungsziel';
    if(needsPayBefore()) payTxt = 'Warten auf Zahlung';
    if(isBar()) payTxt = isAbh() ? 'Bar bei Abholung' : 'Bar bei Uebergabe';
    if(isZoll()) payTxt = 'Zahlungsziel (Zoll)';
    const lief = isSp() ? formatLieferterminTicket().replace(/—/g, '-') : '-';
    
    // Tags
    let tags = [];
    if(x) tags.push(x.l + ' (Prio ' + x.p + ')');
    if(S.isKombi) tags.push('KOMBI');
    if(isFix()) tags.push('Fix: ' + fmtD(S.fixDatum));
    if(isZoll()) tags.push('Zoll: ' + S.zielland);
    if(S.isLoose) tags.push('Loose');
    if(S.isSonder) tags.push('SONDERFALL');
    if(S.isSonderverein) tags.push('SONDERVEREINBARUNG');
    if(S.fixOverride) tags.push('OVERRIDE');
    
    // HEADER
    doc.setFontSize(18);
    doc.setFont('helvetica', 'bold');
    doc.setTextColor(46, 160, 67);
    doc.text('Arbeitsanweisungsticket', ml, y);
    
    doc.setFontSize(20);
    doc.setTextColor(30, 30, 30);
    doc.text(S.au || '-', pw - mr, y, { align: 'right' });
    y += 7;
    
    doc.setFontSize(9);
    doc.setFont('helvetica', 'normal');
    doc.setTextColor(120, 120, 120);
    doc.text('elvinci.de | Backoffice | ' + new Date().toLocaleString('de-DE'), ml, y);
    doc.text(S.kunde || '-', pw - mr, y, { align: 'right' });
    y += 3;
    
    // Gruene Linie
    doc.setDrawColor(46, 160, 67);
    doc.setLineWidth(1);
    doc.line(ml, y, pw - mr, y);
    y += 8;
    
    // TAGS
    doc.setFontSize(8);
    doc.setFont('helvetica', 'bold');
    let tx = ml;
    tags.forEach(function(t) {
        const tw = doc.getTextWidth(t) + 5;
        if(tx + tw > pw - mr) { tx = ml; y += 6; }
        if(t.includes('SONDERFALL') || t.includes('OVERRIDE')) {
            doc.setFillColor(254, 226, 226);
            doc.setTextColor(200, 30, 30);
        } else {
            doc.setFillColor(220, 240, 255);
            doc.setTextColor(0, 90, 150);
        }
        doc.roundedRect(tx, y - 4, tw, 6, 1, 1, 'F');
        doc.text(t, tx + 2.5, y);
        tx += tw + 2;
    });
    y += 8;
    
    // VORKASSE WARNUNG
    if(needsPayBefore()) {
        doc.setFillColor(255, 250, 220);
        doc.setDrawColor(245, 158, 11);
        doc.setLineWidth(0.7);
        doc.roundedRect(ml, y, cw, 16, 2, 2, 'FD');
        doc.setFontSize(12);
        doc.setFont('helvetica', 'bold');
        doc.setTextColor(180, 90, 0);
        doc.text('WARTEN AUF ZAHLUNGSEINGANG', pw / 2, y + 7, { align: 'center' });
        doc.setFontSize(9);
        doc.setFont('helvetica', 'normal');
        doc.text('Versand erst nach Zahlungseingang! 7 Tage Frist.', pw / 2, y + 13, { align: 'center' });
        y += 22;
    }
    
    // DATEN TABELLE
    const colW = cw / 4;
    const rowH = 14;
    
    function box(label, value, bx, by) {
        doc.setFillColor(248, 250, 252);
        doc.setDrawColor(200, 210, 220);
        doc.setLineWidth(0.3);
        doc.rect(bx, by, colW, rowH, 'FD');
        doc.setFontSize(7);
        doc.setFont('helvetica', 'bold');
        doc.setTextColor(100, 110, 130);
        doc.text(label.toUpperCase(), bx + 3, by + 5);
        doc.setFontSize(10);
        doc.setFont('helvetica', 'bold');
        doc.setTextColor(30, 30, 30);
        const v = String(value || '-').substring(0, 18).replace(/—/g, '-');
        doc.text(v, bx + 3, by + 11);
    }
    
    // Zeile 1
    box('Auftrag', S.au, ml, y);
    box('Rechnung', reNr, ml + colW, y);
    box('Kunde', S.kunde, ml + colW * 2, y);
    box('Zahlungsart', x ? x.l : '-', ml + colW * 3, y);
    y += rowH;
    
    // Zeile 2
    box('Versand', VS[S.va] ? VS[S.va].l : '-', ml, y);
    box('Artikel', S.artAnz + ' Stk', ml + colW, y);
    box('Paletten', S.pal, ml + colW * 2, y);
    box('LDM', S.ldm, ml + colW * 3, y);
    y += rowH;
    
    // Zeile 3
    box('Frachtkosten', isSp() ? S.frachtkosten : '-', ml, y);
    box('Kommissionierung', S.kDat ? fmtD(S.kDat) : '-', ml + colW, y);
    box('Liefertermin', lief, ml + colW * 2, y);
    box('Status', payTxt, ml + colW * 3, y);
    y += rowH + 6;
    
    // SEKTIONEN
    function section(title, content, bg, border, titleCol) {
        const lines = doc.splitTextToSize(String(content || '-'), cw - 10);
        const h = 10 + lines.length * 4;
        doc.setFillColor(bg[0], bg[1], bg[2]);
        doc.setDrawColor(border[0], border[1], border[2]);
        doc.setLineWidth(0.4);
        doc.roundedRect(ml, y, cw, h, 2, 2, 'FD');
        doc.setFontSize(9);
        doc.setFont('helvetica', 'bold');
        doc.setTextColor(titleCol[0], titleCol[1], titleCol[2]);
        doc.text(title, ml + 4, y + 6);
        doc.setFontSize(9);
        doc.setFont('helvetica', 'normal');
        doc.setTextColor(40, 40, 40);
        doc.text(lines, ml + 4, y + 12);
        y += h + 4;
    }
    
    if(isZoll()) {
        section('ZOLL: ' + (S.zielland || '-'), 'Export-Lieferung', [255, 250, 220], [245, 180, 50], [150, 80, 0]);
    }
    if(S.isSonder) {
        section('SONDERFALL', S.sonderText, [255, 235, 235], [240, 80, 80], [200, 30, 30]);
    }
    if(S.besonderes) {
        section('VEREINBARUNGEN', S.besonderes, [235, 248, 255], [50, 150, 220], [0, 100, 160]);
    }
    if(S.isLoose) {
        section('LOOSE', S.looseInfo || 'Direkte LKW-Beladung', [235, 248, 255], [50, 150, 220], [0, 100, 160]);
    }
    
    // KOMMENTARE
    if(S.komm && S.komm.length > 0) {
        const kh = 10 + S.komm.length * 6;
        doc.setFillColor(248, 250, 252);
        doc.setDrawColor(200, 210, 220);
        doc.setLineWidth(0.3);
        doc.roundedRect(ml, y, cw, kh, 2, 2, 'FD');
        doc.setFontSize(9);
        doc.setFont('helvetica', 'bold');
        doc.setTextColor(100, 110, 130);
        doc.text('KOMMENTARE (' + S.komm.length + ')', ml + 4, y + 6);
        let ky = y + 12;
        doc.setFontSize(8);
        S.komm.forEach(function(c) {
            doc.setFont('helvetica', 'bold');
            doc.setTextColor(40, 40, 40);
            const prefix = c.w + ': ';
            doc.text(prefix, ml + 4, ky);
            doc.setFont('helvetica', 'normal');
            doc.text(String(c.t).substring(0, 70), ml + 4 + doc.getTextWidth(prefix), ky);
            ky += 5;
        });
        y += kh + 4;
    }
    
    // AUDIT LOG
    const maxAudit = Math.min(S.audit.length, 12);
    const ah = 10 + maxAudit * 5;
    doc.setFillColor(248, 250, 252);
    doc.setDrawColor(200, 210, 220);
    doc.setLineWidth(0.3);
    doc.roundedRect(ml, y, cw, ah, 2, 2, 'FD');
    doc.setFontSize(9);
    doc.setFont('helvetica', 'bold');
    doc.setTextColor(100, 110, 130);
    doc.text('PROTOKOLL (' + S.audit.length + ')', ml + 4, y + 6);
    let ay = y + 12;
    doc.setFontSize(7);
    S.audit.slice(0, maxAudit).forEach(function(e) {
        doc.setFont('helvetica', 'normal');
        doc.setTextColor(100, 110, 130);
        doc.text(e.ts, ml + 4, ay);
        doc.text(e.st, ml + 32, ay);
        doc.setTextColor(40, 40, 40);
        const txt = (e.a + (e.d ? ' - ' + e.d : '')).substring(0, 55);
        doc.text(txt, ml + 52, ay);
        ay += 4.5;
    });
    y += ah + 6;
    
    // FOOTER
    if(needsPayBefore()) {
        doc.setFillColor(255, 250, 220);
        doc.setDrawColor(245, 158, 11);
        doc.setLineWidth(0.7);
        doc.roundedRect(ml, y, cw, 12, 2, 2, 'FD');
        doc.setFontSize(11);
        doc.setFont('helvetica', 'bold');
        doc.setTextColor(180, 90, 0);
        doc.text('Warten auf Zahlungseingang', pw / 2, y + 8, { align: 'center' });
    } else {
        doc.setFillColor(220, 255, 230);
        doc.setDrawColor(46, 160, 67);
        doc.setLineWidth(0.7);
        doc.roundedRect(ml, y, cw, 12, 2, 2, 'FD');
        doc.setFontSize(11);
        doc.setFont('helvetica', 'bold');
        doc.setTextColor(30, 130, 60);
        doc.text('Auftrag vollstaendig bearbeitet', pw / 2, y + 8, { align: 'center' });
    }
    
    // DOWNLOAD
    const fn = 'Ticket_' + (S.au || 'Auftrag').replace(/[^a-zA-Z0-9]/g, '_') + '_' + new Date().toISOString().slice(0, 10) + '.pdf';
    doc.save(fn);
}

function cpTick(){
    const x=z(),reNr=isZoll()?S.reZoll:S.re;
    let t=`═══ ARBEITSANWEISUNGSTICKET ═══\n${new Date().toLocaleString('de-DE')}\n\nAU: ${S.au}\nRE: ${reNr||'—'}\nKunde: ${S.kunde}\nTyp: ${x.l} (Prio ${x.p})\n`;
    t+=`Artikel: ${S.artAnz} | Paletten: ${S.pal||'—'} | LDM: ${S.ldm||'—'}\nVersand: ${VS[S.va]?.l||'—'}\n`;
    t+=`Tags: ${tgs().map(x=>x.x).join(', ')}\n`;
    if(isFix())t+=`Fixtermin: ${S.fixDatum}\n`;
    if(S.termin)t+=`Terminwunsch: ${S.termin}\n`;
    if(S.besonderes)t+=`Vereinbarungen: ${S.besonderes}\n`;
    if(S.isSonder)t+=`SONDERFALL: ${S.sonderText}\n`;
    if(S.isSonderverein)t+=`SONDERVEREINBARUNG: customer-facing Klausel im JTL-Text\n`;
    if(isZoll())t+=`Zoll: ${S.zielland} | Verladen: ${S.verladenInfo||'—'} | Nicht: ${S.nichtVerladen||'—'}\n`;
    if(S.isLoose)t+=`Loose: ${S.looseInfo||'Ja'}\n`;
    if(S.notizen)t+=`Notizen: ${S.notizen}\n`;
    t+=`\n--- Audit ---\n`;S.audit.forEach(e=>t+=`[${e.ts}] ${e.st} | ${e.a}${e.d?' — '+e.d:''}\n`);
    if(S.komm.length){t+=`\n--- Kommentare ---\n`;S.komm.forEach(c=>t+=`${c.w} (${c.ts}): ${c.t}\n`);}
    navigator.clipboard.writeText(t).then(()=>{const b=event.target.closest('button');b.textContent='✓';setTimeout(()=>b.innerHTML='📋',2000)});
}

// INIT
const _restoredAt=loadDraft(); // versucht V2, fällt zurück auf V1-Migration
// Schema-Migration: Felder ergänzen falls aus älterem localStorage / V1-Migration geladen
if(!S.dailyChecks)  S.dailyChecks  = { date:'', tasks:{} };
if(!S.notifyFired)  S.notifyFired  = { date:'', slots:{} };
if(!S.weeklyReport) S.weeklyReport = { notes:'', engpaesse:'', klaerfaelle:'' };
// Wenn-Dann — Pflicht-Felder defensiv defaulten
if(!S.jtlAbgleich)  S.jtlAbgleich  = { mengen:false, versandart:false, zz:false };
if(!S.endChecklist) S.endChecklist = { teams:false, pipeline:false, sharepoint:false };
if(typeof S.rePdfAttached==='undefined') S.rePdfAttached=false;
if(typeof S.rePdfAttachedAt==='undefined') S.rePdfAttachedAt='';
if(typeof S.warenwert==='undefined') S.warenwert='';
if(typeof S.ammMailSent==='undefined') S.ammMailSent=false;
if(typeof S.zollMailSent==='undefined') S.zollMailSent=false;
_migrateConfig(); // D3c — befüllt fehlende S.config-Felder mit Defaults
// Tier 1.2 — Wenn nichts geladen wurde, ersten Auftrag anlegen
if(!S.id){
    S.id=uuid();
    _ACTIVE_ID=S.id;
}
if(_restoredAt){
    const cnt=Object.keys(_ORDERS).length;
    lg('Stand wiederhergestellt', new Date(_restoredAt).toLocaleString('de-DE')+(cnt>1?` · ${cnt} Aufträge`:''));
}else{
    lg('Workflow gestartet', new Date().toLocaleDateString('de-DE'));
    save(); // initialer Auftrag in localStorage anlegen
}
render();
// D3a — Notification-Timer starten, wenn bereits Permission da ist
if(notifyPermission()==='granted') notifyStart();
</script>
